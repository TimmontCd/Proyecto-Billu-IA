  function buildProjectsExecutiveModel_(projects) {
    const safeProjects = Array.isArray(projects) ? projects.slice() : [];
    const ownerOptions = buildProjectsOwnerOptions_(safeProjects);
    const ownerFilteredProjects = filterProjectsByOwner_(safeProjects);
    const periodOptions = buildProjectsPeriodOptions_(ownerFilteredProjects);
    const normalizedPeriod = normalizeProjectsPeriodSelection_(periodOptions);
    state.projectsPeriodMode = normalizedPeriod.mode;
    state.projectsPeriodValue = normalizedPeriod.value;
    const filteredProjects = filterProjectsByPeriod_(ownerFilteredProjects, normalizedPeriod.mode, normalizedPeriod.value);
    const grouped = groupProjectsByType_(filteredProjects);
    const total = filteredProjects.length;
    const averageAdvance = total ? Math.round(filteredProjects.reduce((sum, project) => sum + Number(project.avancePct || 0), 0) / total) : 0;
    const criticalRows = buildProjectsCriticalRows_(filteredProjects);
    const doneCountFromSource = sumProjectMetric_(filteredProjects, 'pipelineDone');
    const backlogCountFromSource = sumProjectMetric_(filteredProjects, 'pipelineBacklog');
    const doneCount = doneCountFromSource > 0
      ? doneCountFromSource
      : filteredProjects.filter(project => String(project.estatus || '') === 'DONE').length;
    const backlogCount = backlogCountFromSource > 0
      ? backlogCountFromSource
      : filteredProjects.filter(project => ['NOT_STARTED', 'IN_PROGRESS'].indexOf(String(project.estatus || '')) > -1).length;
    const impactEstimate = sumProjectMetric_(grouped.mejoras, 'impactEstimate') || sumProjectMetric_(filteredProjects, 'impactEstimate') || criticalRows.reduce((sum, row) => sum + Number(row.impactEstimate || 0), 0);
    const topProjects = filteredProjects.slice().sort((left, right) => projectRiskScore_(right) - projectRiskScore_(left)).slice(0, 5);
    const incidentCritical = sumProjectMetric_(filteredProjects, 'incidentCriticalCount');
    const incidentHigh = sumProjectMetric_(filteredProjects, 'incidentHighCount');
    const incidentMedium = sumProjectMetric_(filteredProjects, 'incidentMediumCount');
    const fallbackHigh = grouped.incidencias.filter(project => String(project.prioridad || '') === 'HIGH' || String(project.semaforo || '') === 'YELLOW').length;
    const fallbackMedium = grouped.incidencias.filter(project => !String(project.prioridad || '') || ['MEDIUM', 'LOW'].indexOf(String(project.prioridad || '')) > -1).length;
    const criticalCount = incidentCritical > 0 ? incidentCritical : criticalRows.length;
    const deviationAvgPct = computeAverageDeviationPct_(filteredProjects);
    const activeProjects = grouped.proyectos.filter(project => String(project.estatus || '') !== 'DONE').length;

    return {
      filteredProjects: filteredProjects,
      grouped: grouped,
      ownerOptions: ownerOptions,
      periodOptions: periodOptions,
      portfolioHealthPct: averageAdvance,
      criticalSummary: criticalCount
        ? `${criticalCount} incidencia(s) crítica(s) listas para deep dive ejecutivo.`
        : 'Sin incidencias críticas abiertas en este momento.',
      criticalRows: criticalRows,
      doneCount: doneCount,
      backlogCount: backlogCount,
      impactLabel: impactEstimate ? formatMoneyCompact_(impactEstimate) : '$0',
      kpis: {
        activeProjects: activeProjects,
        criticalIncidents: criticalCount,
        improvementsImpact: impactEstimate,
        portfolioAdvancePct: averageAdvance,
        deviationAvgPct: deviationAvgPct
      },
      incidentBuckets: {
        critical: criticalCount,
        high: incidentHigh > 0 ? incidentHigh : fallbackHigh,
        medium: incidentMedium > 0 ? incidentMedium : fallbackMedium
      },
      topProjects: topProjects
    };
  }

  function renderProjectsExecutiveKpis_(kpis) {
    const data = kpis || {};
    const cards = [
      {
        label: 'Proyectos activos',
        value: Number(data.activeProjects || 0).toLocaleString('es-MX'),
        sub: 'Total en curso',
        tone: ''
      },
      {
        label: 'Incidencias críticas',
        value: Number(data.criticalIncidents || 0).toLocaleString('es-MX'),
        sub: 'Nivel de fuego',
        tone: Number(data.criticalIncidents || 0) > 0 ? 'is-critical' : 'is-ok'
      },
      {
        label: 'Impacto mejoras',
        value: formatMoneyCompact_(Number(data.improvementsImpact || 0), true),
        sub: 'Acumulado estimado',
        tone: ''
      },
      {
        label: 'Desviación promedio',
        value: `${Number(data.deviationAvgPct || 0).toLocaleString('es-MX', { maximumFractionDigits: 1, minimumFractionDigits: 1 })}%`,
        sub: `Avance global ${Number(data.portfolioAdvancePct || 0).toLocaleString('es-MX')}%`,
        tone: Number(data.deviationAvgPct || 0) >= 25 ? 'is-warning' : 'is-ok'
      }
    ];

    return cards.map(card => `
      <div class="projects-score-card ${card.tone}">
        <span>${escapeHtml(card.label)}</span>
        <strong>${escapeHtml(card.value)}</strong>
        <small>${escapeHtml(card.sub)}</small>
      </div>
    `).join('');
  }

  function buildProjectsOwnerOptions_(projects) {
    const byKey = {};
    (projects || []).forEach(project => {
      const owner = formatProjectOwner_(project);
      if (!owner.key) return;
      if (!byKey[owner.key]) byKey[owner.key] = owner;
    });
    return Object.keys(byKey)
      .map(key => byKey[key])
      .sort((left, right) => String(left.name || '').localeCompare(String(right.name || ''), 'es', { sensitivity: 'base' }));
  }

  function hydrateProjectsOwnerFilter_(options) {
    const select = document.getElementById('projectsOwnerFilter');
    if (!select) return;
    const previous = state.projectsOwnerFilter || '';
    select.innerHTML = `<option value="">Todos los responsables</option>${
      (options || []).map(option => `<option value="${escapeHtml(option.key)}">${escapeHtml(option.name)}</option>`).join('')
    }`;
    select.value = previous;
  }

  function buildProjectsPeriodOptions_(projects) {
    const monthMap = {};
    const quarterMap = {};
    (projects || []).forEach(project => {
      const date = getProjectReferenceDate_(project);
      if (!date) return;
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const monthKey = `${year}-${String(month).padStart(2, '0')}`;
      if (!monthMap[monthKey]) {
        const monthLabel = new Intl.DateTimeFormat('es-MX', { month: 'long', year: 'numeric' }).format(new Date(year, month - 1, 1));
        monthMap[monthKey] = {
          value: monthKey,
          label: monthLabel.charAt(0).toUpperCase() + monthLabel.slice(1)
        };
      }

      const quarter = Math.floor((month - 1) / 3) + 1;
      const quarterKey = `${year}-Q${quarter}`;
      if (!quarterMap[quarterKey]) {
        quarterMap[quarterKey] = {
          value: quarterKey,
          label: `T${quarter} ${year}`
        };
      }
    });

    const sortDesc = (left, right) => String(right.value || '').localeCompare(String(left.value || ''), 'es', { numeric: true });
    return {
      month: Object.keys(monthMap).map(key => monthMap[key]).sort(sortDesc),
      quarter: Object.keys(quarterMap).map(key => quarterMap[key]).sort(sortDesc)
    };
  }

  function normalizeProjectsPeriodSelection_(periodOptions) {
    const modeRaw = String(state.projectsPeriodMode || 'all').trim().toLowerCase();
    const mode = ['month', 'quarter'].indexOf(modeRaw) > -1 ? modeRaw : 'all';
    if (mode === 'all') return { mode: 'all', value: '' };
    const list = mode === 'month' ? (periodOptions && periodOptions.month || []) : (periodOptions && periodOptions.quarter || []);
    if (!list.length) return { mode: mode, value: '' };
    const current = String(state.projectsPeriodValue || '').trim();
    const exists = list.some(item => String(item.value || '') === current);
    return {
      mode: mode,
      value: exists ? current : String(list[0].value || '')
    };
  }

  function hydrateProjectsPeriodFilter_(periodOptions) {
    const modeSelect = document.getElementById('projectsPeriodMode');
    const valueSelect = document.getElementById('projectsPeriodValue');
    if (!modeSelect || !valueSelect) return;

    const mode = String(state.projectsPeriodMode || 'all');
    modeSelect.value = mode;
    if (mode === 'all') {
      valueSelect.disabled = true;
      valueSelect.innerHTML = '<option value="">Todo el historial</option>';
      valueSelect.value = '';
      return;
    }

    const source = mode === 'quarter'
      ? (periodOptions && periodOptions.quarter || [])
      : (periodOptions && periodOptions.month || []);
    valueSelect.disabled = false;
    valueSelect.innerHTML = source.length
      ? source.map(item => `<option value="${escapeHtml(item.value)}">${escapeHtml(item.label)}</option>`).join('')
      : '<option value="">Sin periodos disponibles</option>';
    valueSelect.value = String(state.projectsPeriodValue || '');
  }

  function filterProjectsByOwner_(projects) {
    const ownerKey = String(state.projectsOwnerFilter || '').trim();
    if (!ownerKey) return (projects || []).slice();
    return (projects || []).filter(project => {
      const owner = formatProjectOwner_(project);
      return owner.key === ownerKey;
    });
  }

  function filterProjectsByPeriod_(projects, modeOverride, valueOverride) {
    const mode = String(modeOverride || state.projectsPeriodMode || 'all').trim().toLowerCase();
    const value = String(valueOverride !== undefined ? valueOverride : state.projectsPeriodValue || '').trim();
    if (mode === 'all' || !value) return (projects || []).slice();
    return (projects || []).filter(project => {
      const key = getProjectPeriodKey_(project, mode);
      return key === value;
    });
  }

  function getProjectPeriodKey_(project, mode) {
    const date = getProjectReferenceDate_(project);
    if (!date) return '';
    const year = date.getFullYear();
    const month = date.getMonth() + 1;
    if (mode === 'month') return `${year}-${String(month).padStart(2, '0')}`;
    if (mode === 'quarter') return `${year}-Q${Math.floor((month - 1) / 3) + 1}`;
    return '';
  }

  function getProjectReferenceDate_(project) {
    const candidates = [
      project && project.fechaInicio,
      project && project.fechaCompromiso,
      project && project.updatedAt,
      project && project.createdAt
    ];
    for (let i = 0; i < candidates.length; i += 1) {
      const parsed = parseProjectDateValue_(candidates[i]);
      if (parsed) return parsed;
    }
    return null;
  }

  function parseProjectDateValue_(value) {
    if (!value) return null;
    if (Object.prototype.toString.call(value) === '[object Date]' && !Number.isNaN(value.getTime())) {
      return value;
    }
    const raw = String(value).trim();
    if (!raw) return null;
    const isoMatch = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (isoMatch) {
      const isoDate = new Date(Number(isoMatch[1]), Number(isoMatch[2]) - 1, Number(isoMatch[3]));
      if (!Number.isNaN(isoDate.getTime())) return isoDate;
    }
    const slashMatch = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (slashMatch) {
      const mxDate = new Date(Number(slashMatch[3]), Number(slashMatch[2]) - 1, Number(slashMatch[1]));
      if (!Number.isNaN(mxDate.getTime())) return mxDate;
    }
    const parsed = new Date(raw);
    if (Number.isNaN(parsed.getTime())) return null;
    return parsed;
  }

  function groupProjectsByType_(projects) {
    const grouped = { proyectos: [], mejoras: [], incidencias: [] };
    (projects || []).forEach(project => {
      const type = normalizeProjectTypeClient_(project.tipo);
      if (type === 'MEJORA') grouped.mejoras.push(project);
      else if (type === 'INCIDENCIA') grouped.incidencias.push(project);
      else grouped.proyectos.push(project);
    });

    if (!grouped.incidencias.length) {
      grouped.incidencias = (projects || []).filter(project =>
        Number(project.incidentCriticalCount || 0) > 0
          || Number(project.incidentHighCount || 0) > 0
          || String(project.semaforo || '').toUpperCase() === 'RED'
      );
    }

    grouped.proyectos.sort((a, b) => projectRiskScore_(b) - projectRiskScore_(a));
    grouped.mejoras.sort((a, b) => Number(b.impactEstimate || 0) - Number(a.impactEstimate || 0));
    grouped.incidencias.sort((a, b) => {
      const severityDelta = projectSeverityWeight_(b) - projectSeverityWeight_(a);
      if (severityDelta !== 0) return severityDelta;
      return projectRiskScore_(b) - projectRiskScore_(a);
    });
    return grouped;
  }

  function normalizeProjectTypeClient_(value) {
    const key = String(value || '').toUpperCase();
    if (key.indexOf('INCIDEN') > -1) return 'INCIDENCIA';
    if (key.indexOf('MEJORA') > -1 || key.indexOf('ORDEN') > -1) return 'MEJORA';
    return 'PROYECTO';
  }

  function renderProjectsColumnRows_(rows, options) {
    const list = Array.isArray(rows) ? rows.slice(0, 7) : [];
    if (!list.length) return `<div class="empty">${escapeHtml((options && options.emptyMessage) || 'Sin registros.')}</div>`;
    return list.map(project => renderProjectsColumnItem_(project, options || {})).join('');
  }

  function renderProjectsColumnItem_(project, options) {
    const owner = formatProjectOwner_(project);
    const badge = projectStatusBadge_(project);
    const progress = Math.max(0, Math.min(100, Number(project.avancePct || 0)));
    const progressClass = projectProgressClass_(project);
    const severity = projectSeverityLabel_(project);
    const impact = Number(project.impactEstimate || 0);
    const metaRange = formatCompactDateRange_(project.fechaInicio, project.fechaCompromiso);
    const whatsappUrl = buildOwnerWhatsAppLink_(project);

    return `
      <article class="projects-list-item">
        <div class="projects-list-item-head">
          <strong>${escapeHtml(project.nombre || project.folio || 'Proyecto sin nombre')}</strong>
          <span class="projects-status-badge ${badge.className}">${escapeHtml(badge.label)}</span>
        </div>
        <div class="projects-list-item-meta">
          <span>${escapeHtml(owner.name)}</span>
          <span>${escapeHtml(metaRange)}</span>
        </div>
        ${options.showProgress !== false ? `
          <div class="projects-list-progress">
            <span class="projects-list-progress-track"></span>
            <span class="projects-list-progress-bar ${progressClass}" style="width:${Math.max(8, progress)}%"></span>
          </div>
          <div class="projects-list-micro">Tramo activo ${progress.toLocaleString('es-MX')}%</div>
        ` : ''}
        ${(options.showImpact || options.showSeverity) ? `
          <div class="projects-list-stats">
            ${options.showImpact ? `<span>Impacto ${escapeHtml(formatMoneyCompact_(impact, true))}</span>` : ''}
            ${options.showSeverity ? `<span>Severidad ${escapeHtml(severity)}</span>` : ''}
          </div>
        ` : ''}
        <div class="projects-list-actions">
          <button type="button" class="projects-inline-link" onclick="openProjectsDrawer()">Deep Dive</button>
          ${whatsappUrl && String(project.semaforo || '').toUpperCase() === 'RED'
            ? `<a class="projects-wa-link" href="${escapeHtml(whatsappUrl)}" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp al owner" title="Contactar por WhatsApp al owner">WhatsApp</a>`
            : ''}
        </div>
      </article>
    `;
  }

  function projectSeverityLabel_(project) {
    if (Number(project.incidentCriticalCount || 0) > 0) return 'Crítica';
    if (Number(project.incidentHighCount || 0) > 0) return 'Alta';
    return 'Media';
  }

  function projectSeverityWeight_(project) {
    const prioridad = String(project && project.prioridad || '').toUpperCase();
    if (Number(project && project.incidentCriticalCount || 0) > 0 || prioridad.indexOf('CRIT') > -1) return 300;
    if (Number(project && project.incidentHighCount || 0) > 0 || prioridad === 'HIGH' || prioridad === 'ALTA') return 200;
    if (Number(project && project.incidentMediumCount || 0) > 0 || prioridad === 'MEDIUM' || prioridad === 'MEDIA') return 120;
    if (prioridad === 'LOW' || prioridad === 'BAJA') return 60;
    return 40;
  }

  function projectStatusBadge_(project) {
    const status = String(project.estatus || '').toUpperCase();
    const traffic = String(project.semaforo || '').toUpperCase();
    if (status === 'DONE') return { label: 'Completado', className: 'is-done' };
    if (status === 'BLOCKED' || traffic === 'RED') return { label: 'Crítico', className: 'is-critical' };
    if (status === 'AT_RISK' || traffic === 'YELLOW') return { label: 'En riesgo', className: 'is-warning' };
    if (normalizeProjectTypeClient_(project.tipo) === 'MEJORA') return { label: 'Pipeline', className: 'is-pipeline' };
    return { label: 'En curso', className: 'is-progress' };
  }

  function projectProgressClass_(project) {
    const status = String(project.estatus || '').toUpperCase();
    const progress = Number(project.avancePct || 0);
    if (status === 'DONE') return 'is-done';
    if (progress >= 95) return 'is-critical';
    if (progress >= 80) return 'is-warning';
    return 'is-progress';
  }

  function formatCompactDateRange_(startDate, endDate) {
    const start = formatCompactDate_(startDate);
    const end = formatCompactDate_(endDate);
    if (start && end) return `${start} - ${end}`;
    return end || start || 'Sin fecha objetivo';
  }

  function formatCompactDate_(value) {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return '';
    return new Intl.DateTimeFormat('es-MX', { day: '2-digit', month: 'short' }).format(date).replace('.', '');
  }

  function buildOwnerWhatsAppLink_(project) {
    const phone = String(project && project.responsableTelefono || '').replace(/[^\d]/g, '');
    if (!phone) return '';
    return `https://wa.me/${phone}`;
  }

  function computeAverageDeviationPct_(projects) {
    const list = (projects || []).filter(project => String(project.estatus || '').toUpperCase() !== 'DONE');
    if (!list.length) return 0;
    const sum = list.reduce((acc, project) => {
      const due = project.fechaCompromiso ? new Date(project.fechaCompromiso) : null;
      if (!due || Number.isNaN(due.getTime())) return acc;
      const diffDays = overdueDaysForProject_(project);
      const pct = Math.min(100, diffDays * 6);
      return acc + pct;
    }, 0);
    return Math.round((sum / list.length) * 10) / 10;
  }

  function applyProjectsViewMode_() {
    const mode = state.projectsViewMode === 'presentation' ? 'presentation' : 'management';
    const view = document.getElementById('view-projects');
    if (!view) return;
    view.classList.toggle('projects-presentation-mode', mode === 'presentation');
    const select = document.getElementById('projectsViewMode');
    if (select) select.value = mode;
  }

  function sumProjectMetric_(projects, fieldName) {
    return (projects || []).reduce((sum, project) => {
      const value = Number(project && project[fieldName] || 0);
      return sum + (Number.isFinite(value) ? value : 0);
    }, 0);
  }

  function buildProjectsCriticalRows_(projects) {
    return projects
      .filter(project => isCriticalProject_(project))
      .map(project => {
        const owner = formatProjectOwner_(project);
        const mttrMinutes = Number(project.mttrMinutes || 0) > 0
          ? Number(project.mttrMinutes || 0)
          : estimateProjectMttrMinutes_(project);
        const severityLabel = Number(project.incidentCriticalCount || 0) > 0
          ? 'Crítica'
          : Number(project.incidentHighCount || 0) > 0
            ? 'Alta'
            : 'Media';
        return {
          id: project.folio || project.id || '',
          titulo: project.nombre || 'Incidencia sin título',
          responsable: owner.name,
          responsableInitials: owner.initials,
          responsableAvatar: buildAvatarDataUri_(owner.name, owner.initials),
          estado: severityLabel,
          mttr: formatMttr_(mttrMinutes),
          mttrMinutes: mttrMinutes,
          impactEstimate: Number(project.impactEstimate || 0) > 0
            ? Number(project.impactEstimate || 0)
            : estimateProjectImpact_(project),
          projectId: project.id || '',
          semaforo: project.semaforo || '',
          prioridad: project.prioridad || ''
        };
      });
  }

  function renderProjectsCriticalBoard(projects) {
    if (!projects || !projects.length) {
      return '<div class="empty">Todavía no hay proyectos suficientes para construir el tablero crítico.</div>';
    }

    const rowsHtml = projects.map(project => renderProjectsCriticalRow_(project)).join('');

    return `
      <div class="projects-critical-table">
        <div class="projects-critical-table-head">
          <span>Proyecto</span>
          <span>Owner</span>
          <span>Tramo activo</span>
          <span>Status</span>
          <span>Deep Dive</span>
        </div>
        ${rowsHtml}
      </div>
    `;
  }

  function renderProjectsCriticalRow_(project) {
    const owner = formatProjectOwner_(project);
    const progress = Math.max(12, Math.min(100, Number(project.avancePct || 0)));
    const badge = projectStatusBadge_(project);
    const progressClass = projectProgressClass_(project);
    const whatsappUrl = buildOwnerWhatsAppLink_(project);
    const dateRange = formatCompactDateRange_(project.fechaInicio, project.fechaCompromiso);
    const whatsappLink = whatsappUrl && String(project.semaforo || '').toUpperCase() === 'RED'
      ? `<a class="projects-wa-link" href="${escapeHtml(whatsappUrl)}" target="_blank" rel="noopener" title="Contactar por WhatsApp">WhatsApp</a>`
      : '';
    return `
      <div class="projects-critical-row">
        <div class="projects-critical-project">
          <strong>${escapeHtml(project.nombre || '')}</strong>
          <span>${escapeHtml(project.area || 'Sin área')} · ${escapeHtml(dateRange)}</span>
        </div>
        <div class="projects-critical-owner">
          <span>${escapeHtml(owner.name)}</span>
          ${whatsappLink}
        </div>
        <div class="projects-critical-timeline">
          <span class="projects-critical-track"></span>
          <span class="projects-critical-progress ${progressClass}" style="width:${progress}%"></span>
        </div>
        <div><span class="projects-status-badge ${badge.className}">${escapeHtml(badge.label)}</span></div>
        <div><button type="button" class="projects-deep-dive-link" onclick="openProjectsDrawer()">Deep Dive</button></div>
      </div>
    `;
  }

  function renderProjectsDrawerTable(rows) {
    const effectiveRows = Array.isArray(rows) ? rows.slice() : buildProjectsExecutiveModel_(state.projects || []).criticalRows.slice();
    const sortedRows = effectiveRows.sort((left, right) => {
      const key = state.projectsDrawerSortKey || 'mttrMinutes';
      const dir = state.projectsDrawerSortDir === 'asc' ? 1 : -1;
      const leftValue = normalizeProjectsDrawerSortValue_(left[key]);
      const rightValue = normalizeProjectsDrawerSortValue_(right[key]);
      if (leftValue < rightValue) return -1 * dir;
      if (leftValue > rightValue) return 1 * dir;
      return 0;
    });

    const bodyNode = document.getElementById('projectsDrawerTableBody');
    if (!bodyNode) return;
    if (!sortedRows.length) {
      bodyNode.innerHTML = `
        <tr>
          <td colspan="6">
            <div class="empty">No hay incidencias críticas listas para revisión ejecutiva.</div>
          </td>
        </tr>
      `;
      return;
    }

    bodyNode.innerHTML = sortedRows.map(row => `
      <tr>
        <td>${escapeHtml(row.id || '')}</td>
        <td>${escapeHtml(row.titulo || '')}</td>
        <td>
          <div class="projects-drawer-owner">
            <img src="${row.responsableAvatar}" alt="${escapeHtml(row.responsable || '')}" class="projects-drawer-avatar">
            <span>${escapeHtml(row.responsable || '')}</span>
          </div>
        </td>
        <td><span class="projects-critical-badge">${escapeHtml(row.estado || 'Crítico')}</span></td>
        <td>${escapeHtml(row.mttr || '')}</td>
        <td class="projects-drawer-action-cell">
          <button type="button" class="projects-drawer-action" data-tooltip="Ver Historial completo" title="Ver Historial completo" onclick="showToast('Historial completo disponible próximamente para ' + ${JSON.stringify(String(row.id || ''))})">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </td>
      </tr>
    `).join('');
  }

  function normalizeProjectsDrawerSortValue_(value) {
    if (typeof value === 'number') return value;
    return String(value || '').toLowerCase();
  }

  function openProjectsDrawer() {
    state.projectsDrawerOpen = true;
    renderProjectsDrawerTable();
    const overlayNode = document.getElementById('projectsDrawerOverlay');
    if (overlayNode) overlayNode.classList.remove('hidden-panel');
    document.body.classList.add('projects-drawer-open');
  }

  function closeProjectsDrawer() {
    state.projectsDrawerOpen = false;
    const overlayNode = document.getElementById('projectsDrawerOverlay');
    if (overlayNode) overlayNode.classList.add('hidden-panel');
    document.body.classList.remove('projects-drawer-open');
  }

  function isCriticalProject_(project) {
    const semaforo = String(project.semaforo || '').toUpperCase();
    const prioridad = String(project.prioridad || '').toUpperCase();
    const estatus = String(project.estatus || '').toUpperCase();
    const hasCriticalIncidents = Number(project.incidentCriticalCount || 0) > 0;
    return semaforo === 'RED' || prioridad === 'CRITICAL' || estatus === 'BLOCKED' || estatus === 'AT_RISK' || hasCriticalIncidents;
  }

  function projectRiskScore_(project) {
    let score = Number(project.avancePct || 0) * -1;
    if (String(project.semaforo || '').toUpperCase() === 'RED') score += 140;
    if (String(project.prioridad || '').toUpperCase() === 'CRITICAL') score += 110;
    if (String(project.estatus || '').toUpperCase() === 'BLOCKED') score += 90;
    if (String(project.estatus || '').toUpperCase() === 'AT_RISK') score += 70;
    score += Math.max(0, Number(project.incidentCriticalCount || 0)) * 45;
    score += Math.max(0, Number(project.incidentHighCount || 0)) * 18;
    score += Math.max(0, Number(project.backlog || 0)) * 2;
    score += Math.max(0, overdueDaysForProject_(project)) * 3;
    return score;
  }

  function overdueDaysForProject_(project) {
    if (!project || !project.fechaCompromiso) return 0;
    const dueDate = new Date(project.fechaCompromiso);
    const now = new Date();
    const diff = Math.floor((startOfDaySafe_(now) - startOfDaySafe_(dueDate)) / 86400000);
    return diff > 0 ? diff : 0;
  }

  function startOfDaySafe_(value) {
    const date = new Date(value);
    date.setHours(0, 0, 0, 0);
    return date.getTime();
  }

  function estimateProjectMttrMinutes_(project) {
    const overdueDays = overdueDaysForProject_(project);
    const priorityMap = {
      CRITICAL: 160,
      HIGH: 95,
      MEDIUM: 55,
      LOW: 35
    };
    const statusMap = {
      BLOCKED: 60,
      AT_RISK: 35,
      IN_PROGRESS: 20,
      NOT_STARTED: 15,
      DONE: 5
    };
    return Math.max(
      15,
      Number(priorityMap[String(project.prioridad || '').toUpperCase()] || 45) +
      Number(statusMap[String(project.estatus || '').toUpperCase()] || 0) +
      overdueDays * 12
    );
  }

  function estimateProjectImpact_(project) {
    const baseByPriority = {
      CRITICAL: 180000,
      HIGH: 110000,
      MEDIUM: 65000,
      LOW: 30000
    };
    return Number(baseByPriority[String(project.prioridad || '').toUpperCase()] || 45000);
  }

  function projectStatusPillLabel_(project) {
    if (String(project.semaforo || '').toUpperCase() === 'RED') return 'Riesgo';
    if (String(project.estatus || '').toUpperCase() === 'DONE') return 'Cerrado';
    if (String(project.estatus || '').toUpperCase() === 'BLOCKED') return 'Bloqueado';
    return 'En curso';
  }

  function formatProjectOwner_(projectOrEmail) {
    const hasObjectPayload = projectOrEmail && typeof projectOrEmail === 'object';
    const explicitName = hasObjectPayload ? String(projectOrEmail.responsableNombre || '').trim() : '';
    const email = hasObjectPayload
      ? String(projectOrEmail.responsableEmail || projectOrEmail.sponsor || '').trim()
      : String(projectOrEmail || '').trim();
    const raw = explicitName || email || 'Sin dueño';
    const local = raw.split('@')[0] || raw || 'Sin dueño';
    const parts = local.split(/[._-]+/).filter(Boolean);
    const name = parts.length
      ? parts.map(fragment => fragment.charAt(0).toUpperCase() + fragment.slice(1)).join(' ')
      : raw;
    const initials = name.split(/\s+/).filter(Boolean).slice(0, 2).map(part => part.charAt(0).toUpperCase()).join('') || 'NA';
    const key = String(email || name || '').toLowerCase().trim();
    return {
      name: name || 'Sin dueño',
      initials: initials,
      key: key
    };
  }

  function buildAvatarDataUri_(name, initials) {
    const safeInitials = encodeURIComponent(String(initials || 'NA'));
    const safeName = encodeURIComponent(String(name || 'Responsable'));
    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="${safeName}">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#dff7ef"/>
            <stop offset="100%" stop-color="#8cd8c5"/>
          </linearGradient>
        </defs>
        <rect width="64" height="64" rx="32" fill="url(#g)"/>
        <text x="50%" y="54%" text-anchor="middle" font-family="Montserrat, Avenir Next, Segoe UI, sans-serif" font-size="25" font-weight="700" fill="#0f3f3d">${safeInitials}</text>
      </svg>
    `.trim();
    return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
  }

  function formatMttr_(minutes) {
    const total = Number(minutes || 0);
    if (total >= 60) {

      const remaining = total % 60;

    return `${total} min`;
  }

  function formatMoneyCompact_(amount, withDecimals) {
    const value = Number(amount || 0);
    if (value >= 1000000) return `$${(value / 1000000).toFixed(withDecimals ? 1 : 0)}M`;
    if (value >= 1000) return `$${Math.round(value / 1000)}k`;
    return `$${value.toLocaleString('es-MX')}`;
  }

  async function saveTinchoManualPayload(payload) {
    const content = String((payload && payload.contenido) || '');
    if (!state.tinchoManualImportedFromFile && content.length <= 5000) {
      return server('saveTinchoManualController', payload);
    }

    const uploadId = `tincho_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    const chunkSize = 24000;
    const totalChunks = Math.ceil(content.length / chunkSize);

    setTinchoStatus('info', `Subiendo manual grande a Tincho en ${Number(totalChunks).toLocaleString('es-MX')} bloques...`);

    for (let chunkIndex = 0; chunkIndex < totalChunks; chunkIndex += 1) {
      const chunk = content.slice(chunkIndex * chunkSize, (chunkIndex + 1) * chunkSize);
      const chunkResponse = await server('saveTinchoManualChunkController', {
        uploadId,
        chunkIndex,
        totalChunks,
        chunk
      });
      handleResponse(chunkResponse);
    }

    const finalPayload = Object.assign({}, payload, {
      uploadId
    });
    delete finalPayload.contenido;

    return server('finalizeTinchoManualUploadController', finalPayload);
  }

  function server(functionName, payload) {
    return invokeServer_(functionName, payload, state.authSessionToken || getStoredSessionToken_() || '');
  }

  function serverPublic_(functionName, payload) {
    return invokeServer_(functionName, payload, '');
  }

  function invokeServer_(functionName, payload, sessionToken) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(result => {
          if (result === null || result === undefined) {
            reject(new Error(`El servidor devolvio una respuesta vacia para ${functionName}.`));
            return;
          }
          if (result && result.ok === false && result.details && result.details.code === 'AUTH_REQUIRED') {
            if (state.authLoginEnabled) {
              clearStoredSessionToken_();
              state.authSessionToken = '';
              state.user = null;
              hydrateHeader();
              applyRoleVisibility();
              showAuthModal_('login', 'Tu sesión expiró. Inicia sesión nuevamente.');
            }
            const authError = new Error('AUTH_REQUIRED');
            authError.code = 'AUTH_REQUIRED';
            reject(authError);
            return;
          }
          resolve(result);
        })
        .withFailureHandler(error => reject(new Error(error.message || error)))
        .invokeController(functionName, payload, sessionToken || '');
    });
  }

  function handleResponse(response, successMessage) {
    if (!response || typeof response.ok !== 'boolean') {
      throw new Error('La respuesta del servidor no llego en el formato esperado.');
    }
    if (!response.ok) throw new Error(response.message || 'Error inesperado');
    if (successMessage) showToast(successMessage);
    return response.data;
  }

  function alertStageLabel(stage) {

    if (stage === 'critical') return 'Escalado';

  }

  function buildRealtimeAlertSubline(alerting) {
    if (!alerting) return 'Sin evaluacion';
    if (alerting.stage === 'disabled') {
      return 'Monitor simplificado: solo Outlook';
    }
    if (alerting.stage === 'critical' || alerting.stage === 'warning') {
      return alerting.pendingSince
        ? `Pendiente desde ${alerting.pendingSince}`
        : 'Pendiente de confirmacion';
    }
    if (alerting.windowLabel && alerting.cadenceMinutes) {
      return `Sync ${alerting.syncIntervalMinutes || 1} min, alerta cada ${formatRealtimeCadence(alerting.cadenceMinutes)} en ${alerting.windowLabel}`;
    }
    if (!alerting.warningMinutes && !alerting.criticalMinutes) {
      return `Sync ${alerting.syncIntervalMinutes || 5} min, bucket ${alerting.rollupIntervalMinutes || 5} min`;
    }
    return `Sync ${alerting.syncIntervalMinutes || 1} min, umbrales ${alerting.warningMinutes || 45}/${alerting.criticalMinutes || 75} min`;
  }

  function formatRealtimeCadence(minutes) {
    const value = Number(minutes || 0);
    if (value === 240) return '4 horas';
    if (value === 45) return '45 minutos';
    if (value > 0 && value % 60 === 0) return `${value / 60} horas`;
    return `${value} minutos`;
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result).split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function readTextFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ''));
      reader.onerror = reject;
      reader.readAsText(file, 'utf-8');
    });
  }

  async function extractPdfText(file) {
    if (!window.pdfjsLib || !window.pdfjsLib.getDocument) {
      throw new Error('No fue posible cargar el lector de PDF. Puedes pegar el contenido manualmente.');
    }

    const buffer = await file.arrayBuffer();
    const loadingTask = window.pdfjsLib.getDocument({ data: buffer });
    const pdf = await loadingTask.promise;
    const pages = [];

    for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
      const page = await pdf.getPage(pageNumber);
      const textContent = await page.getTextContent();
      const pageText = (textContent.items || [])
        .map(item => item && item.str ? item.str : '')
        .join(' ')
        .replace(/\s+/g, ' ')
        .trim();

      if (pageText) pages.push(pageText);
    }

    const text = pages.join('\n\n').trim();
    if (!text || text.split(/\s+/).filter(Boolean).length < 40) {
      throw new Error(`No se pudo extraer suficiente texto de ${file.name}. Si el PDF viene escaneado, pega el contenido manualmente.`);
    }

    return {
      text,
      pageCount: pdf.numPages
    };
  }

  async function importTinchoManualFile(input) {
    const file = input && input.files && input.files.length ? input.files[0] : null;
    if (!file) {
      resetTinchoManualFileStatus();
      return;
    }

    const form = document.getElementById('tinchoManualForm');
    if (!form) return;

    const fileName = file.name || 'manual';
    const extension = fileName.toLowerCase().split('.').pop();
    let extractedText = '';
    let statusMessage = '';

    setTinchoStatus('info', `Leyendo manual ${fileName} para cargarlo en Tincho...`);

    if (extension === 'pdf') {
      const extraction = await extractPdfText(file);
      extractedText = extraction.text;
      statusMessage = `${fileName} cargado. ${Number(extraction.pageCount || 0).toLocaleString('es-MX')} pagina(s) procesadas.`;
    } else if (extension === 'txt') {
      extractedText = (await readTextFile(file)).replace(/\r\n/g, '\n').trim();
      if (!extractedText || extractedText.split(/\s+/).filter(Boolean).length < 20) {
        throw new Error(`No se encontró suficiente texto en ${fileName}.`);
      }
      statusMessage = `${fileName} cargado correctamente desde texto plano.`;
    } else {
      throw new Error('Por ahora Tincho solo admite archivos PDF o TXT para la carga automática.');
    }

    const titleInput = form.querySelector('[name="titulo"]');
    const sourceInput = form.querySelector('[name="sourceName"]');
    const contentInput = form.querySelector('[name="contenido"]');

    if (titleInput && !String(titleInput.value || '').trim()) {
      titleInput.value = fileName.replace(/\.[^.]+$/, '');
    }
    if (sourceInput && !String(sourceInput.value || '').trim()) {
      sourceInput.value = `Archivo cargado: ${fileName}`;
    }
    if (contentInput) {
      contentInput.value = extractedText;
    }

    state.tinchoManualImportedFromFile = true;
    updateTinchoManualFileStatus(statusMessage);
    setTinchoStatus('success', `${statusMessage} Ya puedes guardar el manual.`);
  }

  async function copyTextToClipboard(text) {

    if (navigator.clipboard && navigator.clipboard.writeText) {

    }
    const helper = document.createElement('textarea');
    helper.value = safeText;

    helper.select();
    document.execCommand('copy');

  async function startTinchoVoiceCapture_() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      throw new Error('Tu navegador no soporta captura de voz en esta vista. En Chrome normalmente funciona al darle permiso al micrófono.');
    }

    const voiceButton = document.getElementById('tinchoVoiceBtn');
    const input = document.getElementById('tinchoQuestionInput');
    const form = document.getElementById('tinchoQueryForm');
    if (!input || !form) {
      throw new Error('No encontré la vista de BeBot para capturar tu instrucción.');
    }

    if (state.tinchoRecognizer) {
      try {
        state.tinchoRecognizer.stop();
      } catch (error) {}
      state.tinchoRecognizer = null;
    }

    hideTinchoMicPermissionDialog_();

    const recognition = new SpeechRecognition();
    state.tinchoRecognizer = recognition;
    recognition.lang = 'es-MX';
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;
    let finalTranscript = '';

    if (voiceButton) {
      voiceButton.disabled = true;
      voiceButton.classList.add('is-listening');
      voiceButton.setAttribute('aria-label', 'Escuchando');
      voiceButton.setAttribute('title', 'Escuchando');
    }
    updateTinchoVoiceStatus('Solicitando acceso al micrófono...');
    await ensureTinchoMicrophoneAccess_();
    updateTinchoVoiceStatus('Escuchando tu instrucción. Habla con naturalidad y espera un momento al terminar.');

    recognition.onresult = event => {
      let transcript = '';
      for (let index = event.resultIndex; index < event.results.length; index += 1) {
        transcript += event.results[index][0].transcript || '';
        if (event.results[index].isFinal) {
          finalTranscript += event.results[index][0].transcript || '';
        }
      }
      input.value = (finalTranscript || transcript).trim();
      updateTinchoVoiceStatus('Transcribiendo... puedes esperar a que se envíe automáticamente.');
    };

    recognition.onerror = event => {
      updateTinchoVoiceStatus(resolveTinchoVoiceErrorMessage_(event.error));
      if (voiceButton) {
        voiceButton.disabled = false;
        voiceButton.classList.remove('is-listening');
        voiceButton.setAttribute('aria-label', 'Hablar con BeBot');
        voiceButton.setAttribute('title', 'Hablar con BeBot');
      }
      state.tinchoRecognizer = null;
    };

    recognition.onend = () => {
      if (voiceButton) {
        voiceButton.disabled = false;
        voiceButton.classList.remove('is-listening');
        voiceButton.setAttribute('aria-label', 'Hablar con BeBot');
        voiceButton.setAttribute('title', 'Hablar con BeBot');
      }
      state.tinchoRecognizer = null;
      if (String(input.value || '').trim()) {
        updateTinchoVoiceStatus('Listo. BeBot ya tomó tu instrucción por voz.');
        form.requestSubmit();
      } else {
        updateTinchoVoiceStatus('No detecté una instrucción clara. Inténtalo otra vez o escríbele.');
      }
    };

    recognition.start();
  }

  async function ensureTinchoMicrophoneAccess_() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      return;
    }

    const permissionState = await getTinchoMicrophonePermissionState_();
    let stream = null;
    try {
      if (permissionState === 'prompt' || permissionState === 'unknown') {
        updateTinchoVoiceStatus('Chrome va a pedir permiso para usar el micrófono...');
      } else if (permissionState === 'denied') {
        updateTinchoVoiceStatus('Verificando de nuevo el acceso al micrófono...');
      }
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (error) {
      if (error && (error.name === 'NotAllowedError' || error.name === 'SecurityError')) {
        const permissionError = new Error('Chrome no tiene permiso para usar tu micrófono en esta página. Autorízalo en el candado de la barra y también en Preferencias del Sistema > Privacidad y seguridad > Micrófono.');
        permissionError.silentHandled = true;
        showTinchoMicPermissionDialog_(buildTinchoMicPermissionMessage_(permissionState));
        updateTinchoVoiceStatus('Permiso de micrófono pendiente. Sigue los pasos del popup para activarlo.');
        throw permissionError;
      }
      if (error && error.name === 'NotFoundError') {
        throw new Error('No encontré un micrófono disponible en este equipo.');
      }
      if (error && error.name === 'NotReadableError') {
        throw new Error('El micrófono está ocupado por otra app o Chrome no puede leerlo ahora. Cierra otras apps de voz y vuelve a intentar.');
      }
      throw new Error('No fue posible activar el micrófono para hablarle a BeBot.');
    } finally {
      if (stream) {
        stream.getTracks().forEach(track => {
          try {
            track.stop();
          } catch (stopError) {}
        });
      }
    }
  }

  async function getTinchoMicrophonePermissionState_() {
    if (!navigator.permissions || !navigator.permissions.query) {
      return 'unknown';
    }
    try {
      const status = await navigator.permissions.query({ name: 'microphone' });
      return status && status.state ? status.state : 'unknown';
    } catch (error) {
      return 'unknown';
    }
  }

  function resolveTinchoVoiceErrorMessage_(errorCode) {
    const code = String(errorCode || '').trim();
    if (code === 'not-allowed' || code === 'service-not-allowed') {
      return 'El navegador bloqueó el micrófono. Revisa el candado de la página y el permiso de micrófono para Chrome en macOS.';
    }
    if (code === 'no-speech') {
      return 'No detecté voz. Inténtalo otra vez hablando un poco más cerca del micrófono.';
    }
    if (code === 'audio-capture') {
      return 'No pude capturar audio del micrófono. Revisa que esté conectado y habilitado.';
    }
    if (code === 'network') {
      return 'Hubo un problema de red al intentar reconocer tu voz. Inténtalo otra vez.';
    }
    if (code === 'aborted') {
      return 'La captura por voz se canceló antes de terminar.';
    }
    return 'No pude capturar la voz: ' + (code || 'error desconocido') + '.';
  }

  function updateTinchoVoiceStatus(message) {
    const node = document.getElementById('tinchoVoiceStatus');
    if (!node) return;
    node.textContent = message || '';
  };

  function showTinchoMicPermissionDialog_(message) {
    const overlay = document.getElementById('tinchoMicPermissionOverlay');
    const copy = document.getElementById('tinchoMicPermissionMessage');
    if (copy) copy.textContent = message || 'Chrome necesita permiso para escuchar tu instrucción.';

  function hideTinchoMicPermissionDialog_() {
    const overlay = document.getElementById('tinchoMicPermissionOverlay');
    if (overlay) overlay.classList.add('hidden-panel');
  }

  function buildTinchoMicPermissionMessage_(permissionState) {
    const host = window.location.hostname || 'esta página';
    if (permissionState === 'denied') {
      return `Chrome sigue reportando el micrófono como bloqueado para ${host}. Si ya lo habilitaste, recarga la página y vuelve a intentar para que el permiso se refresque.`;
    }
    return `Chrome no pudo abrir el micrófono para ${host}. Autorízalo en el candado de la página y, si estás en Mac, valida también el permiso del sistema para Google Chrome.`;
  }

  function isTinchoTtsEnabled_() {
    if (state.tincho && state.tincho.settings && state.tincho.settings.enableTts) return true;
    const form = document.getElementById('tinchoConfigForm');
    const checkbox = form ? form.querySelector('[name="enableTts"]') : null;
    return !!(checkbox && checkbox.checked);

  window.playTinchoLatestAnswer = async function (silentMode) {
    const query = state.tinchoLastQuery;
    if (!query || !String(query.respuesta || '').trim()) {
      showToast('Primero genera una respuesta de BeBot para reproducirla.');
      return;
    }

    try {
      setTinchoStatus('info', 'BeBot está generando el audio de la última respuesta...');
      const response = await server('synthesizeTinchoAnswerController', { texto: query.respuesta });
      handleResponse(response, silentMode ? '' : 'Audio generado');
      const data = response.data || {};
      if (!data.audioContent) throw new Error('La API de voz no devolvio audio.');
      if (state.tinchoAudio) {
        state.tinchoAudio.pause();
        state.tinchoAudio = null;
      }
      const audio = new Audio(`data:${data.mimeType || 'audio/mpeg'};base64,${data.audioContent}`);
      state.tinchoAudio = audio;
      await audio.play();
      setTinchoStatus('success', 'Reproduciendo la respuesta de BeBot.');
    } catch (error) {
      setTinchoStatus('error', error.message || 'No fue posible reproducir la voz de BeBot.');
      if (!silentMode) {
        showToast(error.message || 'No fue posible reproducir la voz de BeBot.');
      }
      throw error;
    }
  };

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttribute(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function escapeJsString(value) {
    return String(value || '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, '\\\'')
      .replace(/\r/g, ' ')
      .replace(/\n/g, ' ');
  }

  function money(value) {
    return '$' + Number(value || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function inferMimeType(fileName) {
    const lower = String(fileName || '').toLowerCase();
    if (lower.endsWith('.xlsx')) return 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
    if (lower.endsWith('.xls')) return 'application/vnd.ms-excel';
    if (lower.endsWith('.csv')) return 'text/csv';
    return 'application/octet-stream';
  }

  function showConfirmModal(options) {
    const modal = document.getElementById('confirmModal');
    const card = document.getElementById('confirmModalCard');
    const titleNode = document.getElementById('confirmModalTitle');
    const messageNode = document.getElementById('confirmModalMessage');
    const confirmBtn = document.getElementById('confirmModalConfirmBtn');
    const cancelBtn = document.getElementById('confirmModalCancelBtn');
    const closeBtn = document.getElementById('confirmModalCloseBtn');

    const title = options && options.title ? options.title : 'Confirmar acción';
    const message = options && options.message ? options.message : '¿Deseas continuar?';
    const confirmText = options && options.confirmText ? options.confirmText : 'Continuar';
    const cancelText = options && options.cancelText ? options.cancelText : 'Cancelar';
    const tone = String(options && options.tone ? options.tone : 'info').toLowerCase();

    if (!modal || !card || !titleNode || !messageNode || !confirmBtn || !cancelBtn || !closeBtn) {
      return Promise.resolve(window.confirm(message));
    }

    titleNode.textContent = title;
    messageNode.textContent = message;
    confirmBtn.textContent = confirmText;
    cancelBtn.textContent = cancelText;

    card.classList.remove('confirm-card-info', 'confirm-card-warning', 'confirm-card-danger');
    if (tone === 'danger') {
      card.classList.add('confirm-card-danger');
    } else if (tone === 'warning') {
      card.classList.add('confirm-card-warning');
    } else {
      card.classList.add('confirm-card-info');
    }
    confirmBtn.classList.add('primary');

    modal.classList.remove('hidden');

    return new Promise(resolve => {
      let finished = false;
      const finish = result => {
        if (finished) return;
        finished = true;
        modal.classList.add('hidden');
        modal.removeEventListener('click', onBackdropClick);
        document.removeEventListener('keydown', onKeyDown);
        confirmBtn.removeEventListener('click', onConfirm);
        cancelBtn.removeEventListener('click', onCancel);
        closeBtn.removeEventListener('click', onCancel);
        resolve(result);
      };
      const onConfirm = () => finish(true);
      const onCancel = () => finish(false);
      const onBackdropClick = event => {
        if (event.target === modal) finish(false);
      };
      const onKeyDown = event => {
        if (event.key === 'Escape') finish(false);
      };

      confirmBtn.addEventListener('click', onConfirm);
      cancelBtn.addEventListener('click', onCancel);
      closeBtn.addEventListener('click', onCancel);
      modal.addEventListener('click', onBackdropClick);
      document.addEventListener('keydown', onKeyDown);
      confirmBtn.focus();
    });
  }

  function downloadClientNumbersCsv(clientNumbers, fileName) {
    const rows = [['ID CLIENTE']].concat((clientNumbers || []).map(value => [value]));
    const csv = rows.map(row => row.map(cell => `"${String(cell ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = fileName || 'clientes_correlacionados.csv';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  async function downloadPresetClientNumbersCsv(filter) {
    try {
      const presetId = window.__depositChargePresetId || DEFAULT_DEPOSIT_CHARGE_PRESETS[0].id;
      const exportFilter = filter || 'all';
      const isQualified = exportFilter === 'qualified';
      showProcessingModal(
        'Preparando descarga',
        isQualified
          ? 'Estamos armando el CSV de clientes que cumplen la regla de la cohorte.'
          : 'Estamos armando el CSV de clientes que no cumplen la regla de la cohorte.'
      );
      const response = await server('exportDepositChargePresetController', { presetId, filter: exportFilter });
      handleResponse(response);
      const data = response.data || {};
      downloadClientNumbersCsv(data.clientNumbers || [], data.fileName || window.__depositChargeClientFileName || 'clientes_correlacionados.csv');
      showToast(`${isQualified ? 'Cumplen' : 'No cumplen'}: ${Number((data.clientNumbers || []).length).toLocaleString('es-MX')} clientes.`);
    } catch (error) {
      showToast(error.message || 'No fue posible generar la descarga.');
    } finally {
      hideProcessingModal();
    }
  }

  function downloadCsvContent(content, fileName) {
    const blob = new Blob([content || ''], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = fileName || 'export.csv';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function downloadRowsAsCsv(rows, fileName) {
    if (!rows || !rows.length) {
      showToast('No hay filas para descargar.');
      return;
    }
    const headers = Object.keys(rows[0]);
    const csvRows = [headers].concat(rows.map(row => headers.map(header => formatCsvCellValue(header, row[header]))));
    const csv = csvRows.map(row => row.map(cell => `"${String(cell ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
    downloadCsvContent(csv, fileName || 'resultado.csv');
  }

  function formatCsvCellValue(header, value) {
    if (!shouldFormatCurrencyHeader(header)) return value;
    const numericValue = Number(String(value ?? '').replace(/[^0-9.\-]/g, ''));
    if (Number.isNaN(numericValue)) return value;
    return money(numericValue);
  }

  function shouldFormatCurrencyHeader(header) {
    const normalized = String(header || '').toUpperCase().trim();
    if (!normalized) return false;
    if (normalized.includes('MONTO')) return true;
    if (normalized === 'ABONO' || normalized === 'CARGO') return true;
    if (normalized.includes('SALDO') && !normalized.includes('SEGMENTO') && !normalized.includes('REGLA')) return true;
    return false;
  }

  function downloadCustomerCategorizationQueryRows() {
    downloadRowsAsCsv(
      window.__customerCategorizationQueryRows || [],
      window.__customerCategorizationQueryFileName || 'id_recompensas_consulta.csv'
