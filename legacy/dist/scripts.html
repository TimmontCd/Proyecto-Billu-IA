<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
  const DEFAULT_DEPOSIT_CHARGE_PRESETS = [
    { id: 'apertura_y_uso_first_30_dias', label: 'Apertura y uso First 30 dias', description: 'Clientes abiertos en los ultimos 30 dias que logran al menos 3 cargos y 1 abono dentro de sus primeros 30 dias.' }
  ];
  const VIEW_SUBTITLES = {
    realtime: 'Monitoreo operativo en linea para el enrolamiento de Billu.',
    'conversion-agent': 'Seguimiento de clientes atorados en su apertura para detonar correos de ayuda y recuperación.',
    'whatsapp-agent': 'Espacio reservado para el agente de Whatsapp.',
    accounts: 'Vista ejecutiva para resumir cuentas, saldos, productos e historicos del portafolio.',
    'customer-categorization': 'Segmentacion automatica de clientes a partir de sus saldos y atributos operativos.',
    funnel: 'Automatiza campañas comerciales y transaccionales con selección dinámica, vista previa y bitácora de envíos.',
    projects: 'Seguimiento de proyectos, responsables y tareas del equipo interno.',
    'service-orders': 'Espacio reservado para centralizar ordenes de servicio e incidencias.',
    heatmaps: 'Espacio reservado para cruces visuales y patrones operativos por geografia.',
    audio: 'Seguimiento interno de actividades con responsables autenticados y recordatorios.',
    admin: 'Herramientas de bootstrap, configuracion y checks operativos para administracion.',
    tincho: 'Asistente operativo para crear, actualizar y consultar tareas del módulo de Seguimiento de Actividades.'
  };
  const VIEW_TITLES = {
    realtime: 'Venta en tiempo real',
    'conversion-agent': 'Agente de Conversión',
    'whatsapp-agent': 'Agente de Whatsapp',
    accounts: 'Resumen de Productos',
    'customer-categorization': 'Categorización de clientes',
    funnel: 'Agente de Campañas',
    projects: 'Proyectos',
    'service-orders': 'Ordenes de Servicio e Incidencias',
    heatmaps: 'Mapas de calor',
    audio: 'Seguimiento de Actividades',
    admin: 'Administracion',
    tincho: 'Pregunta a BeBot'
  };

  const state = {
    authSessionToken: '',
    authChecked: false,
    authLoginEnabled: true,
    authBusy: false,
    user: null,
    catalogs: [],
    dashboard: null,
    depositChargePresets: [],
    depositChargeSubView: 'overview',
    depositChargeDebug: null,
    realtimeMonitoring: null,
    conversionAgent: null,
    conversionAgentLoaded: false,
    conversionAgentSelectedRowNumber: null,
    conversionAgentPreview: null,
    conversionAgentFilters: {
      step: '',
      search: ''
    },
    whatsappAgent: null,
    whatsappAgentLoaded: false,
    whatsappAgentMode: 'inbound',
    whatsappAgentSelectedRowNumber: null,
    whatsappAgentPreview: null,
    whatsappAgentFilters: {
      source: '',
      search: '',
      step: ''
    },
    campaigns: null,
    campaignsLoaded: false,
    campaignsSelectedId: null,
    campaignsPreview: null,
    campaignsMode: 'active',
    projects: null,
    projectsLoaded: false,
    projectsOwnerFilter: '',
    projectsPeriodMode: 'all',
    projectsPeriodValue: '',
    projectsViewMode: 'management',
    projectsDrawerOpen: false,
    projectsDrawerSortKey: 'mttrMinutes',
    projectsDrawerSortDir: 'desc',
    customerCategorization: null,
    customerCategorizationLoaded: false,
    customerCategorizationOrder: [],
    customerCategorizationDraggedSegmentId: '',
    accounts: null,
    accountsLoaded: false,
    accountsHistorical: null,
    accountsSubView: 'summary',
    accountsConsumptionPeriodMode: 'quarter',
    accountsConsumptionPeriodValue: '',
    heatmapPilot: null,
    heatmapPilotLoaded: false,
    heatmapPilotSessionId: '',
    heatmapPilotBackendAvailable: null,
    heatmapPilotSubView: 'trial',
    heatmapPilotTrialState: 'idle',
    heatmapPilotCurrentScreenId: '',
    heatmapPilotResultsScreenId: '',
    heatmapPilotForm: {
      privacyConsent: '',
      geolocationConsent: '',
      rewardsId: '',
      phone: '',
      email: '',
      emailCode: ''
    },
    heatmapPilotRefreshTimer: null,
    taskTracking: null,
    taskTrackingLoaded: false,
    tincho: null,
    tinchoLoaded: false,
    tinchoLastQuery: null,
    tinchoAudio: null,
    tinchoManualImportedFromFile: false,
    tinchoRecognizer: null
  };

  document.addEventListener('DOMContentLoaded', () => {
    if (window.pdfjsLib && window.pdfjsLib.GlobalWorkerOptions) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    }
    bindMenu();
    bindForms();
    bindHeatmapPilot();
    bindHeatmapPilotSubtabs();
    bindDepositChargeSubtabs();
    setupRealtimePolling();
    state.depositChargePresets = DEFAULT_DEPOSIT_CHARGE_PRESETS.slice();
    renderDepositChargePresetCatalog(state.depositChargePresets, 'Clientes abiertos en los ultimos 30 dias que cumplen la regla de al menos 3 cargos y 1 abono dentro de sus primeros 30 dias.');
    setDepositChargeSubView(state.depositChargeSubView);
    initAuthFlow_();
  });

  function bindMenu() {
    document.querySelectorAll('.menu-item').forEach(button => {
      button.addEventListener('click', () => {
        activateView(button.dataset.view, button);
      });
    });
  }

  function activateView(view, button) {
    const targetView = view || 'realtime';
    if (state.authLoginEnabled && !state.authSessionToken) {
      showAuthModal_('login', 'Inicia sesión para continuar.');
      return;
    }
    if (targetView !== 'projects') closeProjectsDrawer();
    document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
    if (button) button.classList.add('active');
    document.querySelectorAll('.view').forEach(section => section.classList.remove('active'));
    const targetNode = document.getElementById(`view-${targetView}`);
    if (targetNode) targetNode.classList.add('active');
    document.getElementById('pageTitle').textContent = button ? (button.dataset.title || button.textContent.trim()) : (VIEW_TITLES[targetView] || '');
    document.getElementById('pageSubtitle').textContent = button ? (button.dataset.subtitle || VIEW_SUBTITLES[targetView] || '') : (VIEW_SUBTITLES[targetView] || '');
    if (targetView === 'realtime') refreshRealtimeDashboard();
    if (targetView === 'funnel') loadCampaignProgrammingDashboard();
    if (targetView === 'projects') loadProjectsExecutiveDashboard();
    if (targetView === 'service-orders') loadServiceOrdersDashboard();
    if (targetView === 'conversion-agent') loadConversionAgentDashboard();
    if (targetView === 'whatsapp-agent') loadWhatsAppAgentDashboard();
    if (targetView === 'customer-categorization') loadCustomerCategorizationDashboard();
    if (targetView === 'accounts') {
      setAccountsSubView(state.accountsSubView || 'summary');
      loadAccountsDashboard();
    }
    if (targetView === 'heatmaps') loadHeatmapPilotDashboard();
    if (targetView === 'audio') loadTaskTrackingDashboard();
    if (targetView === 'tincho') loadTinchoDashboard();
  }

  function bindForms() {
    bindAuthForms_();

    bindSubmit('projectForm', async form => {
      const payload = formToObject(form);
      const response = await server('saveProjectController', payload);
      handleResponse(response, 'Proyecto guardado');
      await refreshProjects();
      await loadBootstrap();
      form.reset();
    });

    bindSubmit('taskForm', async form => {
      const payload = formToObject(form);
      payload.avancePct = Number(payload.avancePct || 0);
      const response = await server('saveTaskController', payload);
      handleResponse(response, 'Tarea guardada');
      await loadBootstrap();
      form.reset();
    });

    bindSubmit('audioForm', async form => {
      const fileInput = document.getElementById('audioFile');
      if (!fileInput.files.length) throw new Error('Selecciona un archivo de audio.');
      const file = fileInput.files[0];
      const base64 = await fileToBase64(file);
      const payload = formToObject(form);
      payload.fileName = payload.fileName || file.name;
      payload.mimeType = payload.mimeType || file.type;
      payload.base64 = base64;
      const response = await server('uploadAudioController', payload);
      handleResponse(response, 'Audio procesado');
      document.getElementById('audioResult').innerHTML = `<pre>${escapeHtml(JSON.stringify(response.data, null, 2))}</pre>`;
      form.reset();
      fileInput.value = '';
    });

    bindSubmit('minuteForm', async form => {
      const payload = formToObject(form);
      payload.participantes = (payload.participantes || '').split(',').map(item => item.trim()).filter(Boolean);
      const response = await server('generateMinuteController', payload);
      handleResponse(response, 'Minuta generada');
      document.getElementById('audioResult').innerHTML = `<pre>${escapeHtml(JSON.stringify(response.data, null, 2))}</pre>`;
      form.reset();
    });

    bindSubmit('activityTaskForm', async form => {
      const payload = formToObject(form);
      const response = await server('saveTeamTaskController', payload);
      handleResponse(response, payload.id ? 'Actividad actualizada' : 'Actividad creada');
      resetTaskTrackingForm();
      await loadTaskTrackingDashboard(getTaskTrackingFilters_(), true);
    });

    bindSubmit('activityTaskFilterForm', async form => {
      await loadTaskTrackingDashboard(formToObject(form), true);
    });

    bindSubmit('tinchoQueryForm', async form => {
      const payload = formToObject(form);
      setTinchoStatus('info', 'BeBot esta revisando tus actividades y preparando la mejor respuesta disponible.');
      const response = await server('askTinchoController', payload);
      handleResponse(response, 'BeBot ya preparó una respuesta');
      await loadTinchoDashboard(true);
      renderTinchoQueryResult(response.data.query, response.data.escalation);
      form.reset();
      updateTinchoVoiceStatus('Puedes escribir otra instrucción o volver a dictarla por voz.');
      if (isTinchoTtsEnabled_()) {
        try {
          await window.playTinchoLatestAnswer(true);
        } catch (error) {}
      }
      setTinchoStatus(
        response.data.query && response.data.query.requiresEscalation ? 'warning' : 'success',
        response.data.query && response.data.query.requiresEscalation
          ? 'BeBot no encontró una acción clara y dejó la solicitud marcada para seguimiento.'
          : 'Respuesta de BeBot lista. Puedes calificar su utilidad abajo.'
      );
    });

    bindSubmit('tinchoFeedbackForm', async form => {
      const response = await server('saveTinchoFeedbackController', formToObject(form));
      handleResponse(response, 'Feedback guardado');
      await loadTinchoDashboard(true);
      document.getElementById('tinchoFeedbackForm').classList.add('hidden-panel');
      setTinchoStatus('success', 'Gracias. BeBot guardó tu feedback para seguir afinando sus respuestas.');
    });

    bindSubmit('tinchoManualForm', async form => {
      const payload = buildTinchoFormPayload(form, ['activo', 'syncNow']);
      const response = await saveTinchoManualPayload(payload);
      handleResponse(response, 'Manual guardado para Tincho');
      await loadTinchoDashboard(true);
      form.reset();
      resetTinchoManualFileStatus();
      setTinchoStatus('success', 'Manual registrado. Tincho ya puede usarlo como referencia interna.');
    });

    bindSubmit('tinchoConfigForm', async form => {
      const payload = buildTinchoFormPayload(form, ['enableDialogflow', 'enableTts', 'enableEmailEscalation', 'ensureKnowledgeBase']);
      setTinchoStatus('info', 'Guardando la configuracion de BeBot...');
      const response = await server('saveTinchoConfigController', payload);
      handleResponse(response, 'Configuración de BeBot guardada');
      await loadTinchoDashboard(true);
      renderTinchoSyncSummary(null);
      setTinchoStatus(
        'success',
        'Configuración actualizada. BeBot ya puede usar estos ajustes.'
      );
    });

    const tinchoVoiceBtn = document.getElementById('tinchoVoiceBtn');
    if (tinchoVoiceBtn) {
      tinchoVoiceBtn.addEventListener('click', async () => {
        try {
          await startTinchoVoiceCapture_();
        } catch (error) {
          if (!(error && error.silentHandled)) {
            showToast(error.message || 'No fue posible iniciar la captura por voz.');
          }
        }
      });
    }

    const tinchoMicPermissionRetryBtn = document.getElementById('tinchoMicPermissionRetryBtn');
    if (tinchoMicPermissionRetryBtn) {
      tinchoMicPermissionRetryBtn.addEventListener('click', async () => {
        hideTinchoMicPermissionDialog_();
        try {
          await startTinchoVoiceCapture_();
        } catch (error) {
          if (!(error && error.silentHandled)) {
            showToast(error.message || 'No fue posible iniciar la captura por voz.');
          }
        }
      });
    }

    const tinchoMicPermissionCloseBtn = document.getElementById('tinchoMicPermissionCloseBtn');
    if (tinchoMicPermissionCloseBtn) {
      tinchoMicPermissionCloseBtn.addEventListener('click', () => {
        hideTinchoMicPermissionDialog_();
      });
    }

    const tinchoMicPermissionDismissBtn = document.getElementById('tinchoMicPermissionDismissBtn');
    if (tinchoMicPermissionDismissBtn) {
      tinchoMicPermissionDismissBtn.addEventListener('click', () => {
        hideTinchoMicPermissionDialog_();
      });
    }

    const tinchoMicPermissionOverlay = document.getElementById('tinchoMicPermissionOverlay');
    if (tinchoMicPermissionOverlay) {
      tinchoMicPermissionOverlay.addEventListener('click', event => {
        if (event.target === tinchoMicPermissionOverlay) {
          hideTinchoMicPermissionDialog_();
        }
      });
    }

    bindSubmit('tinchoSyncForm', async form => {
      const payload = buildTinchoFormPayload(form, ['forceResync']);
      setTinchoStatus('info', 'Tincho esta sincronizando manuales con Dialogflow ES...');
      const response = await server('syncTinchoManualsController', payload);
      handleResponse(response, 'Sincronizacion completada');
      state.tincho = response.data.dashboard;
      state.tinchoLoaded = true;
      renderTinchoDashboard(response.data.dashboard);
      renderTinchoSyncSummary(response.data.result || null);
      const result = response.data.result || {};
      setTinchoStatus(
        result.failed ? 'warning' : 'success',
        `Sincronizacion terminada. Exitos: ${Number(result.synced || 0).toLocaleString('es-MX')}, omitidos: ${Number(result.skipped || 0).toLocaleString('es-MX')}, fallidos: ${Number(result.failed || 0).toLocaleString('es-MX')}.`
      );
    });

    bindSubmit('historicalForm', async form => {
      const payload = formToObject(form);
      payload.rows = JSON.parse(payload.rowsJson);
      delete payload.rowsJson;
      const response = await server('importHistoricalController', payload);
      handleResponse(response, 'Historico importado');
      await refreshHistorical();
      form.reset();
    });

    bindSubmit('historicalFilterForm', async form => {
      const response = await server('getHistoricalSummaryController', formToObject(form));
      handleResponse(response);
      renderHistorical(response.data);
    });

    document.getElementById('bootstrapBtn').addEventListener('click', async () => {
      const response = await server('runBootstrapController');
      handleResponse(response, 'Bootstrap ejecutado');
      document.getElementById('adminResult').innerHTML = `<pre>${escapeHtml(JSON.stringify(response.data, null, 2))}</pre>`;
    });

    const projectsServiceOrdersBtn = document.getElementById('projectsServiceOrdersBtn');
    if (projectsServiceOrdersBtn) {
      projectsServiceOrdersBtn.addEventListener('click', () => {
        activateView('service-orders');
      });
    }

    const projectsOwnerFilter = document.getElementById('projectsOwnerFilter');
    if (projectsOwnerFilter) {
      projectsOwnerFilter.addEventListener('change', event => {
        state.projectsOwnerFilter = String(event && event.target && event.target.value || '').trim();
        renderProjectsExecutiveDashboard(state.projects || []);
      });
    }

    const projectsPeriodMode = document.getElementById('projectsPeriodMode');
    if (projectsPeriodMode) {
      projectsPeriodMode.addEventListener('change', event => {
        state.projectsPeriodMode = String(event && event.target && event.target.value || 'all').trim();
        state.projectsPeriodValue = '';
        renderProjectsExecutiveDashboard(state.projects || []);
      });
    }

    const projectsPeriodValue = document.getElementById('projectsPeriodValue');
    if (projectsPeriodValue) {
      projectsPeriodValue.addEventListener('change', event => {
        state.projectsPeriodValue = String(event && event.target && event.target.value || '').trim();
        renderProjectsExecutiveDashboard(state.projects || []);
      });
    }

    const projectsViewMode = document.getElementById('projectsViewMode');
    if (projectsViewMode) {
      projectsViewMode.addEventListener('change', event => {
        state.projectsViewMode = String(event && event.target && event.target.value || 'management').trim();
        applyProjectsViewMode_();
      });
    }

    const projectsCriticalCard = document.getElementById('projectsCriticalCard');
    if (projectsCriticalCard) {
      projectsCriticalCard.addEventListener('click', () => {
        openProjectsDrawer();
      });
    }

    const projectsDrawerCloseBtn = document.getElementById('projectsDrawerCloseBtn');
    if (projectsDrawerCloseBtn) {
      projectsDrawerCloseBtn.addEventListener('click', () => {
        closeProjectsDrawer();
      });
    }

    const projectsDrawerOverlay = document.getElementById('projectsDrawerOverlay');
    if (projectsDrawerOverlay) {
      projectsDrawerOverlay.addEventListener('click', event => {
        if (event.target === projectsDrawerOverlay) {
          closeProjectsDrawer();
        }
      });
    }

    document.querySelectorAll('[data-project-drawer-sort]').forEach(button => {
      button.addEventListener('click', () => {
        const key = button.dataset.projectDrawerSort;
        if (!key) return;
        if (state.projectsDrawerSortKey === key) {
          state.projectsDrawerSortDir = state.projectsDrawerSortDir === 'asc' ? 'desc' : 'asc';
        } else {
          state.projectsDrawerSortKey = key;
          state.projectsDrawerSortDir = key === 'mttrMinutes' ? 'desc' : 'asc';
        }
        renderProjectsDrawerTable();
      });
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && state.projectsDrawerOpen) {
        closeProjectsDrawer();
      }
    });

    document.getElementById('opsCheckBtn').addEventListener('click', async () => {
      const response = await server('runOperationalChecksController');
      handleResponse(response, 'Checks operativos ejecutados');
      document.getElementById('adminResult').innerHTML = `<pre>${escapeHtml(JSON.stringify(response.data, null, 2))}</pre>`;
    });

    document.getElementById('taskTrackingRefreshBtn').addEventListener('click', async () => {
      await loadTaskTrackingDashboard(getTaskTrackingFilters_(), true);
    });

    document.getElementById('taskTrackingReminderBtn').addEventListener('click', async () => {
      const response = await server('runTaskReminderChecksController');
      handleResponse(response, 'Recordatorios enviados');
      setTaskTrackingStatus('success', `Se enviaron ${Number((response.data && response.data.sent) || 0).toLocaleString('es-MX')} recordatorios.`);
      await loadTaskTrackingDashboard(getTaskTrackingFilters_(), true);
    });

    document.getElementById('activityTaskCancelEditBtn').addEventListener('click', () => {
      resetTaskTrackingForm();
    });

    const tinchoManualFileInput = document.getElementById('tinchoManualFile');
    if (tinchoManualFileInput) {
      tinchoManualFileInput.addEventListener('change', async event => {
        try {
          await importTinchoManualFile(event.target);
        } catch (error) {
          updateTinchoManualFileStatus(error.message || 'No fue posible leer el archivo.');
          showToast(error.message || 'No fue posible leer el archivo.');
        }
      });
    }

    document.getElementById('depositChargeRebuildBtn').addEventListener('click', async () => {
      try {
        showProcessingModal(
          'Actualizando vista ejecutiva',
          'Estamos leyendo la hoja Clientes y las hojas transaccionales de enero, febrero y marzo de 2026 para reconstruir la vista ejecutiva.'
        );
        const response = await server('rebuildDepositChargeDashboardController');
        handleResponse(response);
        renderDepositChargeDashboard(response.data);
        if (response.data && response.data.ready) {
          state.depositChargeDebug = null;
          showToast('Vista ejecutiva actualizada');
          setDepositChargeStatus('success', buildDepositChargeSuccessMessage('Vista ejecutiva actualizada', response.data));
        } else {
          await hydrateDepositChargeDebugState();
          renderDepositChargeDashboard(response.data);
          setDepositChargeStatus('info', (response.data && response.data.message) || 'No hay una hoja fuente valida para reconstruir la vista ejecutiva.');
        }
      } catch (error) {
        await hydrateDepositChargeDebugState();
        renderDepositChargeDashboard({
          ready: false,
          message: error.message || 'No fue posible actualizar la vista ejecutiva.',
          queryPresets: state.depositChargePresets && state.depositChargePresets.length ? state.depositChargePresets : DEFAULT_DEPOSIT_CHARGE_PRESETS,
          queryPresetNote: 'Revisa el diagnostico rapido para confirmar si las hojas fuente existen y tienen datos.'
        });
        setDepositChargeStatus('error', error.message || 'No fue posible actualizar la vista ejecutiva.');
        showToast(error.message || 'No fue posible actualizar la vista ejecutiva');
      } finally {
        hideProcessingModal();
      }
    });

    const whatsappRefreshBtn = document.getElementById('whatsappAgentRefreshBtn');
    if (whatsappRefreshBtn) {
      whatsappRefreshBtn.addEventListener('click', async () => {
        await loadWhatsAppAgentDashboard(true);
      });
    }
    const whatsappRefreshOutboundBtn = document.getElementById('whatsappAgentRefreshOutboundBtn');
    if (whatsappRefreshOutboundBtn) {
      whatsappRefreshOutboundBtn.addEventListener('click', async () => {
        await loadWhatsAppAgentDashboard(true);
      });
    }

    const whatsappOutboundBtn = document.getElementById('whatsappAgentOutboundBtn');
    if (whatsappOutboundBtn) {
      whatsappOutboundBtn.addEventListener('click', async () => {
        await sendWhatsAppOutboundCampaign();
      });
    }

    const whatsappInboundTabBtn = document.getElementById('whatsappAgentInboundTabBtn');
    if (whatsappInboundTabBtn) {
      whatsappInboundTabBtn.addEventListener('click', () => {
        setWhatsAppAgentMode('inbound');
      });
    }

    const whatsappOutboundTabBtn = document.getElementById('whatsappAgentOutboundTabBtn');
    if (whatsappOutboundTabBtn) {
      whatsappOutboundTabBtn.addEventListener('click', () => {
        setWhatsAppAgentMode('outbound');
      });
    }

    const whatsappSourceFilter = document.getElementById('whatsappAgentSourceFilter');
    if (whatsappSourceFilter) {
      whatsappSourceFilter.addEventListener('change', event => {
        state.whatsappAgentFilters.source = event.target.value || '';
        renderWhatsAppAgentDashboard(state.whatsappAgent);
      });
    }

    const whatsappSearch = document.getElementById('whatsappAgentSearch');
    if (whatsappSearch) {
      whatsappSearch.addEventListener('input', event => {
        state.whatsappAgentFilters.search = event.target.value || '';
        renderWhatsAppAgentDashboard(state.whatsappAgent);
      });
    }

    const whatsappEscalateBtn = document.getElementById('whatsappAgentEscalateBtn');
    if (whatsappEscalateBtn) {
      whatsappEscalateBtn.addEventListener('click', async () => {
        await escalateWhatsAppAgentSelected();
      });
    }

    const whatsappCopyBtn = document.getElementById('whatsappAgentCopyBtn');
    if (whatsappCopyBtn) {
      whatsappCopyBtn.addEventListener('click', async () => {
        await copyWhatsAppAgentMessage();
      });
    }

    document.getElementById('depositChargeQueryBtn').addEventListener('click', async () => {
      try {
        setDepositChargeSubView('first30');
        showProcessingModal(
          'Analizando Apertura y uso First 30 dias',
          'Estamos cruzando fecha de apertura y uso transaccional de la cohorte reciente.'
        );
        const response = await server('runDepositChargePresetController', { presetId: DEFAULT_DEPOSIT_CHARGE_PRESETS[0].id });
        handleResponse(response, 'Analisis ejecutivo generado');
        renderDepositChargeQueryResult(response.data);
        setDepositChargeStatus('success', `Analisis disponible: ${response.data.presetLabel || 'Apertura y uso First 30 dias'}.`);
      } catch (error) {
        await hydrateDepositChargeDebugState();
        const dashboardNode = document.getElementById('depositChargeSummary');
        if (dashboardNode && (!document.getElementById('depositChargeKpis').innerHTML || !document.getElementById('depositChargeKpis').textContent.trim())) {
          dashboardNode.innerHTML = `
            <div class="empty">${escapeHtml(error.message || 'No fue posible ejecutar el analisis.')}</div>
            ${renderDepositChargeDebugState()}
          `;
        }
        setDepositChargeStatus('error', error.message || 'No fue posible ejecutar el analisis.');
        showToast(error.message || 'No fue posible ejecutar el analisis');
      } finally {
        hideProcessingModal();
      }
    });

    document.getElementById('depositChargeClientBtn').addEventListener('click', async () => {
      try {
        const clientNumber = document.getElementById('depositChargeClientNumber').value.trim();
        if (!clientNumber) throw new Error('Captura un ID CLIENTE.');
        setDepositChargeSubView('client');
        showProcessingModal(
          'Buscando cliente',
          'Estamos armando la ficha ejecutiva del cliente a partir de la hoja de transacciones.'
        );
        const response = await server('getDepositChargeClientViewController', { clientNumber });
        handleResponse(response, 'Ficha de cliente generada');
        renderDepositChargeClientResult(response.data);
      } catch (error) {
        setDepositChargeStatus('error', error.message || 'No fue posible cargar la vista del cliente.');
        showToast(error.message || 'No fue posible cargar la vista del cliente');
      } finally {
        hideProcessingModal();
      }

  function getStoredSessionToken_() {
    try {
      return String(localStorage.getItem('billu_auth_session') || '').trim();
    } catch (error) {
      return '';
    }
  }

  function setStoredSessionToken_(token) {
    try {
      localStorage.setItem('billu_auth_session', String(token || ''));
    } catch (error) {}
  }

  function clearStoredSessionToken_() {
    try {
      localStorage.removeItem('billu_auth_session');
    } catch (error) {}
  }

  function setAuthGateState_(locked) {
    document.body.classList.toggle('auth-gate-active', !!locked);
  }

  function clearAuthFeedback_() {
    const feedbackNode = document.getElementById('authModalFeedback');
    if (!feedbackNode) return;
    feedbackNode.className = 'auth-feedback hidden-panel';
    feedbackNode.removeAttribute('data-loading');
    feedbackNode.innerHTML = '';
  }

  function setAuthFeedback_(tone, title, message, options) {
    const feedbackNode = document.getElementById('authModalFeedback');
    if (!feedbackNode) return;
    const config = options || {};
    const safeTone = ['info', 'error', 'success'].indexOf(String(tone || '').toLowerCase()) > -1
      ? String(tone || '').toLowerCase()
      : 'info';
    const safeTitle = String(title || '').trim();
    const safeMessage = String(message || '').trim();
    if (!safeTitle && !safeMessage) {
      clearAuthFeedback_();
      return;
    }
    feedbackNode.className = `auth-feedback ${safeTone}`;
    if (config.loading) {
      feedbackNode.setAttribute('data-loading', 'true');
    } else {
      feedbackNode.removeAttribute('data-loading');
    }
    feedbackNode.innerHTML = `
      ${safeTitle ? `<strong>${escapeHtml(safeTitle)}</strong>` : ''}
      ${safeMessage ? `<span>${escapeHtml(safeMessage)}</span>` : ''}
    `;
  }

  function setAuthBusy_(busy, activeLabel) {
    const authCard = document.querySelector('#authModal .auth-card');
    const forms = [
      document.getElementById('authLoginForm'),
      document.getElementById('authChangePasswordForm'),
      document.getElementById('authRequestResetForm'),
      document.getElementById('authResetPasswordForm')
    ].filter(Boolean);
    const links = document.querySelectorAll('#authModal .auth-links button');
    state.authBusy = !!busy;
    if (authCard) authCard.classList.toggle('auth-busy', state.authBusy);
    forms.forEach(formNode => {
      formNode.querySelectorAll('input, button').forEach(node => {
        node.disabled = state.authBusy;
      });
    });
    links.forEach(node => {
      node.disabled = state.authBusy;
    });
    forms.forEach(formNode => {
      const submitBtn = formNode.querySelector('button[type="submit"]');
      if (!submitBtn) return;
      if (!submitBtn.dataset.baseLabel) submitBtn.dataset.baseLabel = submitBtn.textContent.trim();
      submitBtn.textContent = state.authBusy && !formNode.classList.contains('hidden-panel')
        ? String(activeLabel || 'Procesando...')
        : submitBtn.dataset.baseLabel;
    });
  }

  function normalizeAuthErrorMessage_(error) {
    const rawMessage = String(error && error.message ? error.message : error || '').trim();
    if (!rawMessage) return 'Ocurrió un error al procesar tu acceso.';
    if (/credenciales inv[aá]lidas/i.test(rawMessage)) {
      return 'El correo o la contraseña no coinciden. Si ya habías definido una nueva contraseña, usa esa. Si no, utiliza la recuperación para generar una nueva.';
    }
    if (/tu usuario est[aá] bloqueado temporalmente/i.test(rawMessage)) {
      return 'Detectamos varios intentos fallidos y tu acceso quedó bloqueado temporalmente. Espera unos minutos o usa recuperación.';
    }
    if (/no tiene contraseñ[aá] configurada/i.test(rawMessage)) {
      return 'Tu usuario aún no tiene una contraseña activa. Usa la opción de recuperación para crear una nueva.';
    }
    return rawMessage;
  }

  function setAuthModalMode_(mode, message) {
    const loginForm = document.getElementById('authLoginForm');
    const changeForm = document.getElementById('authChangePasswordForm');
    const requestResetForm = document.getElementById('authRequestResetForm');
    const resetForm = document.getElementById('authResetPasswordForm');
    const showLoginBtn = document.getElementById('authShowLoginBtn');
    const showRequestBtn = document.getElementById('authShowRequestResetBtn');
    const showResetTokenBtn = document.getElementById('authShowResetTokenFormBtn');
    const titleNode = document.getElementById('authModalTitle');
    const messageNode = document.getElementById('authModalMessage');

    const safeMode = ['login', 'change', 'request', 'reset'].indexOf(String(mode || '').toLowerCase()) >= 0
      ? String(mode || '').toLowerCase()
      : 'login';

    if (titleNode) {
      titleNode.textContent = safeMode === 'change'
        ? 'Actualiza tu contraseña'
        : (safeMode === 'reset' ? 'Restablecer contraseña' : (safeMode === 'request' ? 'Recuperar contraseña' : 'Inicia sesión'));
    }
    if (messageNode) {
      messageNode.textContent = message || (
        safeMode === 'change'
          ? 'Por seguridad, cambia tu contraseña antes de usar el panel.'
          : (safeMode === 'reset'
            ? 'Captura el código que enviamos a tu correo y define tu nueva contraseña.'
            : (safeMode === 'request'
              ? 'Te enviaremos un código temporal para recuperar acceso.'
              : 'Captura tu correo corporativo y contraseña para entrar al panel.'))
      );
    }

    const forms = [loginForm, changeForm, requestResetForm, resetForm].filter(Boolean);
    forms.forEach(formNode => {
      formNode.classList.add('hidden-panel');
      formNode.setAttribute('aria-hidden', 'true');
    });

    const formByMode = {
      login: loginForm,
      change: changeForm,
      request: requestResetForm,
      reset: resetForm
    };
    const activeForm = formByMode[safeMode] || loginForm;
    if (activeForm) {
      activeForm.classList.remove('hidden-panel');
      activeForm.setAttribute('aria-hidden', 'false');
    }

    if (showLoginBtn) {
      const hidden = safeMode === 'login';
      showLoginBtn.classList.toggle('hidden-panel', hidden);
      showLoginBtn.setAttribute('aria-hidden', hidden ? 'true' : 'false');
    }
    if (showRequestBtn) {
      const hidden = safeMode === 'request' || safeMode === 'reset' || safeMode === 'change';
      showRequestBtn.classList.toggle('hidden-panel', hidden);
      showRequestBtn.setAttribute('aria-hidden', hidden ? 'true' : 'false');
    }
    if (showResetTokenBtn) {
      const hidden = safeMode !== 'request';
      showResetTokenBtn.classList.toggle('hidden-panel', hidden);
      showResetTokenBtn.setAttribute('aria-hidden', hidden ? 'true' : 'false');
    }
  }

  function showAuthModal_(mode, message) {
    const modal = document.getElementById('authModal');
    if (modal) modal.classList.remove('hidden');
    setAuthGateState_(true);
    setAuthModalMode_(mode || 'login', message);
  }

  function hideAuthModal_() {
    const modal = document.getElementById('authModal');
    if (modal) modal.classList.add('hidden');
    clearAuthFeedback_();
    setAuthBusy_(false);
    setAuthGateState_(false);
  }

  async function initAuthFlow_() {
    state.authLoginEnabled = !window.__APP_INFO__ || window.__APP_INFO__.authLoginEnabled !== false;
    if (!state.authLoginEnabled) {
      setAuthGateState_(false);
      await loadBootstrap();
      return;
    }

    const token = getStoredSessionToken_();
    if (!token) {
      showAuthModal_('login');
      setAuthBusy_(false);
      setAuthFeedback_('info', 'Acceso protegido', 'Ingresa con tu correo corporativo y tu contraseña actual para entrar.');
      return;
    }

    try {
      showAuthModal_('login', 'Estamos recuperando tu sesión segura.');
      setAuthFeedback_('info', 'Validando sesión', 'Un momento, estamos comprobando tu acceso.', { loading: true });
      setAuthBusy_(true, 'Validando sesión...');
      const response = await serverPublic_('authGetSessionController', { sessionToken: token });
      handleResponse(response);
      state.authSessionToken = token;
      state.user = response.data.user || null;
      await loadBootstrap();
      hideAuthModal_();
    } catch (error) {
      clearStoredSessionToken_();
      state.authSessionToken = '';
      showAuthModal_('login', 'Tu sesión expiró. Vuelve a iniciar sesión.');
      setAuthFeedback_('error', 'Sesión vencida', 'Tu acceso anterior ya no es válido. Vuelve a capturar tu contraseña.');
      setAuthBusy_(false);
    }
  }

  async function loginWithCredentials_(email, password) {
    setAuthFeedback_('info', 'Validando acceso', 'Estamos verificando tus credenciales y preparando tu panel.', { loading: true });
    setAuthBusy_(true, 'Validando acceso...');
    const response = await serverPublic_('authLoginController', {
      email: String(email || '').trim(),
      password: String(password || '')
    });
    handleResponse(response);

    const sessionToken = response.data && response.data.sessionToken ? String(response.data.sessionToken) : '';
    if (!sessionToken) throw new Error('No se recibió token de sesión.');
    state.authSessionToken = sessionToken;
    setStoredSessionToken_(sessionToken);
    state.user = response.data.user || null;
    hydrateHeader();
    applyRoleVisibility();

    if (response.data.mustChangePassword) {
      showAuthModal_('change', 'Tu contraseña temporal venció o requiere actualización.');
      setAuthBusy_(false);
      setAuthFeedback_('info', 'Actualización requerida', 'Antes de entrar al panel, define una contraseña nueva y segura.');
      return;
    }

    setAuthFeedback_('success', 'Acceso aprobado', 'Estamos cargando tu espacio de trabajo.', { loading: true });
    setAuthBusy_(true, 'Entrando...');
    await loadBootstrap();
    hideAuthModal_();
    showToast('Sesión iniciada');
  }

  async function logoutAuthSession_(showMessage) {
    const token = state.authSessionToken || getStoredSessionToken_();
    if (token) {
      try {
        await server('authLogoutController', { sessionToken: token });
      } catch (error) {}
    }

    clearStoredSessionToken_();
    state.authSessionToken = '';
    state.user = null;
    showAuthModal_('login', showMessage ? 'Sesión cerrada.' : '');
    setAuthFeedback_('info', 'Sesión cerrada', 'Cuando quieras continuar, vuelve a capturar tus credenciales.');
    hydrateHeader();
    applyRoleVisibility();
  }

  function bindAuthSubmit_(id, busyLabel, handler) {
    const form = document.getElementById(id);
    if (!form) return;
    form.addEventListener('submit', async event => {
      event.preventDefault();
      try {
        await handler(form);
      } catch (error) {
        setAuthBusy_(false);
        setAuthFeedback_('error', 'No pudimos iniciar', normalizeAuthErrorMessage_(error));
      }
    });
  }

  function bindAuthForms_() {
    bindAuthSubmit_('authLoginForm', 'Validando acceso...', async form => {
      const payload = formToObject(form);
      await loginWithCredentials_(payload.email, payload.password);
      form.reset();
    });

    bindAuthSubmit_('authChangePasswordForm', 'Actualizando...', async form => {
      const payload = formToObject(form);
      if (payload.newPassword !== payload.confirmPassword) {
        throw new Error('La confirmación no coincide con la nueva contraseña.');
      }
      setAuthFeedback_('info', 'Actualizando contraseña', 'Estamos guardando tu nueva contraseña de acceso.');
      setAuthBusy_(true, 'Actualizando...');
      const response = await server('authChangePasswordController', {
        sessionToken: state.authSessionToken || getStoredSessionToken_(),
        currentPassword: payload.currentPassword,
        newPassword: payload.newPassword
      });
      handleResponse(response);
      setAuthFeedback_('success', 'Contraseña actualizada', 'Tu acceso ya está listo. Estamos cargando el panel.');
      setAuthBusy_(true, 'Entrando...');
      await loadBootstrap();
      hideAuthModal_();
      form.reset();
      showToast('Contraseña actualizada');
    });

    bindAuthSubmit_('authRequestResetForm', 'Enviando código...', async form => {
      const payload = formToObject(form);
      setAuthFeedback_('info', 'Generando código', 'Estamos preparando tu código de recuperación.');
      setAuthBusy_(true, 'Enviando código...');
      const response = await serverPublic_('authRequestPasswordResetController', {
        email: payload.email
      });
      handleResponse(response, 'Si el usuario existe, enviamos un código de recuperación.');
      setAuthModalMode_('reset', 'Te enviamos un código temporal. Captúralo para cambiar tu contraseña.');
      setAuthBusy_(false);
      setAuthFeedback_('success', 'Código enviado', 'Revisa tu correo y captura el código temporal para restablecer tu contraseña.');
      const resetEmailInput = document.querySelector('#authResetPasswordForm [name="email"]');
      if (resetEmailInput) resetEmailInput.value = String(payload.email || '').trim();
      form.reset();
    });

    bindAuthSubmit_('authResetPasswordForm', 'Restableciendo...', async form => {
      const payload = formToObject(form);
      if (payload.newPassword !== payload.confirmPassword) {
        throw new Error('La confirmación no coincide con la nueva contraseña.');
      }
      setAuthFeedback_('info', 'Restableciendo contraseña', 'Estamos validando tu código y guardando tu nueva contraseña.');
      setAuthBusy_(true, 'Restableciendo...');
      const response = await serverPublic_('authResetPasswordController', {
        email: payload.email,
        resetToken: payload.resetToken,
        newPassword: payload.newPassword
      });
      handleResponse(response, 'Contraseña restablecida. Ya puedes iniciar sesión.');
      setAuthModalMode_('login', 'Tu contraseña se restableció. Inicia sesión con la nueva contraseña.');
      setAuthBusy_(false);
      setAuthFeedback_('success', 'Contraseña restablecida', 'Tu nueva contraseña ya quedó guardada. Continúa con el inicio de sesión.');
      form.reset();
    });

    const showLoginBtn = document.getElementById('authShowLoginBtn');
    if (showLoginBtn) showLoginBtn.addEventListener('click', () => {
      setAuthBusy_(false);
      setAuthModalMode_('login');
      setAuthFeedback_('info', 'Inicia sesión', 'Usa tu correo corporativo y tu contraseña actual.');
    });
    const showRequestBtn = document.getElementById('authShowRequestResetBtn');
    if (showRequestBtn) showRequestBtn.addEventListener('click', () => {
      setAuthBusy_(false);
      setAuthModalMode_('request');
      setAuthFeedback_('info', 'Recupera tu acceso', 'Te enviaremos un código temporal para definir una nueva contraseña.');
    });
    const showResetTokenBtn = document.getElementById('authShowResetTokenFormBtn');
    if (showResetTokenBtn) showResetTokenBtn.addEventListener('click', () => {
      setAuthBusy_(false);
      setAuthModalMode_('reset');
      setAuthFeedback_('info', 'Ya tengo código', 'Captura el código de recuperación y tu nueva contraseña.');
    });
  }

  async function loadBootstrap() {
    let bootstrapLoaded = false;

    try {
      const response = await server('getBootstrapData');
      handleResponse(response);
      state.user = response.data.user;
      state.catalogs = response.data.catalogs || [];
      state.dashboard = response.data.dashboard;
      hydrateHeader();
      renderDashboard(response.data.dashboard);
      await refreshProjects();
      await refreshFunnel();
      renderHistorical(response.data.dashboard.historicalSummary);
      applyRoleVisibility();
      bootstrapLoaded = true;
    } catch (error) {
      const message = String(error && error.message || '');
      if (state.authLoginEnabled && /AUTH_REQUIRED|AUTH_EXPIRED|Tu sesión expiró/i.test(message)) {
        await logoutAuthSession_(false);
        showAuthModal_('login', 'Tu sesión expiró. Inicia sesión nuevamente.');
      } else {
        state.user = state.user || { name: 'Sesion activa', email: '', role: 'OPERADOR', roles: ['OPERATOR'] };
        state.catalogs = state.catalogs || [];
        state.dashboard = state.dashboard || getEmptyDashboardState();
        hydrateHeader();
        renderDashboard(state.dashboard);
        renderHistorical(state.dashboard.historicalSummary);
        applyRoleVisibility();
      }
    } finally {
      if (!bootstrapLoaded && (!state.authLoginEnabled || state.authSessionToken)) {
        safeRefreshLegacySections();
      }
      if (!state.authLoginEnabled || state.authSessionToken) {
        loadDepositChargeDashboard();
        refreshRealtimeDashboard();
      }
    }
  }

            { id: 'zone_confirm_cta', label: 'Confirmar código', category: 'cta' },
            { id: 'zone_blank_area', label: 'Area sin accion', category: 'background' }
          ]
        }
      ],
      intro: {
        title: 'La prueba está lista para iniciar',
        body: 'La sesión capturará interacción, zonas y coordenadas del flujo móvil. Cuando pulses Comenzar prueba entraremos al aviso de privacidad.'
      },
      outro: {
        title: 'Prueba finalizada',
        body: 'El flujo completo quedó registrado. Ahora puedes pasar a resultados para revisar heatmap, fricción y avance por pantalla.'
      }
    };
  }

  function getHeatmapPilotOrderedScreens_() {
    return (getHeatmapPilotDefaultConfig().screens || []).slice().sort((left, right) => Number(left.step || 0) - Number(right.step || 0));
  }

  function getHeatmapPilotScreenConfig_(screenId) {
    return getHeatmapPilotOrderedScreens_().find(item => item.id === screenId) || getHeatmapPilotOrderedScreens_()[0];
  }

  function getHeatmapPilotScreenIndex_(screenId) {
    return getHeatmapPilotOrderedScreens_().findIndex(item => item.id === screenId);
  }

  function resetHeatmapPilotForm_() {
    state.heatmapPilotForm = {
      privacyConsent: '',
      geolocationConsent: '',
      rewardsId: '',
      phone: '',
      email: '',
      emailCode: ''
    };
  }

  function bindHeatmapPilot() {
    const newSessionButton = document.getElementById('heatmapPilotNewSessionBtn');
    const refreshButton = document.getElementById('heatmapPilotRefreshBtn');
    const resetButton = document.getElementById('heatmapPilotResetBtn');
    const prevScreenButton = document.getElementById('heatmapPilotPrevScreenBtn');
    const nextScreenButton = document.getElementById('heatmapPilotNextScreenBtn');

    if (newSessionButton) {
      newSessionButton.addEventListener('click', () => {
        startHeatmapPilotSession(true);
        setHeatmapPilotSubView('trial');
      });
    }

    if (refreshButton) {
      refreshButton.addEventListener('click', async () => {
        await loadHeatmapPilotDashboard(true);
      });
    }

    const openResultsButton = document.getElementById('heatmapPilotOpenResultsBtn');
    if (openResultsButton) {
      openResultsButton.addEventListener('click', async () => {
        setHeatmapPilotSubView('results');
        await loadHeatmapPilotDashboard(true);
      });
    }

    if (resetButton) {
      resetButton.addEventListener('click', async () => {
        if (!window.confirm('Se eliminarán los eventos del piloto actual. ¿Quieres continuar?')) return;
        try {
          const response = await server('resetPrototypeHeatmapPilotController');
          handleResponse(response, 'Piloto limpiado');
        } catch (error) {}
        state.heatmapPilot = null;
        state.heatmapPilotLoaded = false;
        state.heatmapPilotSessionId = '';
        state.heatmapPilotTrialState = 'idle';
        state.heatmapPilotCurrentScreenId = '';
        state.heatmapPilotResultsScreenId = '';
        resetHeatmapPilotForm_();
        writeLocalHeatmapPilotEvents_([]);
        await loadHeatmapPilotDashboard(true);
        setHeatmapPilotStatus('info', 'Piloto limpiado. Puedes iniciar una nueva sesión cuando quieras.');
      });
    }

    if (prevScreenButton) {
      prevScreenButton.addEventListener('click', () => {
        moveHeatmapPilotResultsScreen_(-1);
      });
    }

    if (nextScreenButton) {
      nextScreenButton.addEventListener('click', () => {
        moveHeatmapPilotResultsScreen_(1);
      });
    }
  }

  function bindHeatmapPilotSubtabs() {
    document.querySelectorAll('#heatmapPilotSubtabs .subtab-button').forEach(button => {
      button.addEventListener('click', async () => {
        const nextView = button.dataset.subview || 'trial';
        setHeatmapPilotSubView(nextView);
        if (nextView === 'results') {
          await loadHeatmapPilotDashboard(true);
        }
      });
    });
  }

  function setHeatmapPilotSubView(view) {
    state.heatmapPilotSubView = view || 'trial';
    document.querySelectorAll('#heatmapPilotSubtabs .subtab-button').forEach(button => {
      button.classList.toggle('active', button.dataset.subview === state.heatmapPilotSubView);
    });
    document.querySelectorAll('#view-heatmaps .subtab-panel').forEach(panel => {
      panel.classList.toggle('active', panel.id === `heatmapPilotSubView-${state.heatmapPilotSubView}`);
    });
  }

  function selectHeatmapPilotResultsScreen(screenId) {
    state.heatmapPilotResultsScreenId = screenId || getHeatmapPilotOrderedScreens_()[0].id;
    renderHeatmapPilotDashboard();
  }

  function moveHeatmapPilotResultsScreen_(offset) {
    const screens = getHeatmapPilotOrderedScreens_();
    const currentId = state.heatmapPilotResultsScreenId || (screens[0] && screens[0].id) || '';
    const currentIndex = Math.max(0, screens.findIndex(item => item.id === currentId));
    const nextIndex = Math.max(0, Math.min(screens.length - 1, currentIndex + Number(offset || 0)));
    state.heatmapPilotResultsScreenId = screens[nextIndex] ? screens[nextIndex].id : currentId;
    renderHeatmapPilotDashboard();
  }

  async function loadHeatmapPilotDashboard(forceRefresh) {
    if (state.heatmapPilotLoaded && !forceRefresh) {
      renderHeatmapPilotDashboard();
      if (!isHeatmapPrototypeMounted_()) renderHeatmapPilotPrototype();
      return;
    }

    try {
      const response = await server('getPrototypeHeatmapDashboardController', {});
      handleResponse(response);
      state.heatmapPilot = response.data || null;
      state.heatmapPilotLoaded = true;
      state.heatmapPilotBackendAvailable = true;
    } catch (error) {
      state.heatmapPilot = buildLocalHeatmapPilotDashboard_();
      state.heatmapPilotLoaded = true;
      state.heatmapPilotBackendAvailable = false;
      setHeatmapPilotStatus('warning', 'El backend del piloto no respondió; estamos usando almacenamiento local en este navegador para poder seguir probando.');
    }

    if (!state.heatmapPilotResultsScreenId) {
      state.heatmapPilotResultsScreenId = getHeatmapPilotOrderedScreens_()[0].id;
    }

    renderHeatmapPilotDashboard();
    if (!isHeatmapPrototypeMounted_()) renderHeatmapPilotPrototype();
  }

  function startHeatmapPilotSession(showNotice) {
    state.heatmapPilotSessionId = buildHeatmapPilotSessionId_();
    state.heatmapPilotTrialState = 'intro';
    state.heatmapPilotCurrentScreenId = getHeatmapPilotOrderedScreens_()[0].id;
    state.heatmapPilotResultsScreenId = state.heatmapPilotCurrentScreenId;
    resetHeatmapPilotForm_();
    renderHeatmapPilotPrototype();
    renderHeatmapPilotDashboard();
    if (showNotice) {
      setHeatmapPilotStatus('info', 'Sesión creada. Cuando pulses Comenzar prueba iniciaremos el flujo desde Aviso de privacidad.');
    }
  }

  function goToHeatmapPilotScreen_(screenId, trackView) {
    state.heatmapPilotTrialState = 'flow';
    state.heatmapPilotCurrentScreenId = screenId;
    state.heatmapPilotResultsScreenId = screenId;
    renderHeatmapPilotPrototype();
    if (screenId === getHeatmapPilotOrderedScreens_()[0].id) {
      setHeatmapPilotStatus('success', 'La prueba inició. Ya puedes recorrer Aviso de privacidad, Datos de contacto y Código correo desde esta vista móvil.');
    }
    if (trackView) {
      trackHeatmapPilotEvent({
        screenId: screenId,
        eventType: 'screen_view',
        buttonState: isHeatmapPilotReadyForScreen_(screenId) ? 'enabled' : 'disabled'
      }, { refresh: true });
    }
  }

  function advanceHeatmapPilotFlow_() {
    const screens = getHeatmapPilotOrderedScreens_();
    const currentIndex = getHeatmapPilotScreenIndex_(state.heatmapPilotCurrentScreenId);
    const nextScreen = screens[currentIndex + 1];
    if (!nextScreen) {
      finishHeatmapPilotFlow_();
      return;
    }
    goToHeatmapPilotScreen_(nextScreen.id, true);
  }

  function finishHeatmapPilotFlow_() {
    state.heatmapPilotTrialState = 'complete';
    renderHeatmapPilotPrototype();
    setHeatmapPilotStatus('success', 'La prueba terminó. Ya puedes revisar resultados del flujo completo.');
    scheduleHeatmapPilotRefresh_();
  }

  function buildHeatmapPilotSessionId_() {
    return `sess_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
  }

  function renderHeatmapPilotDashboard() {
    const data = state.heatmapPilot || buildLocalHeatmapPilotDashboard_();
    const config = data.config || getHeatmapPilotDefaultConfig();
    const summary = data.summary || {};
    const screenSummary = Array.isArray(data.screenSummary) ? data.screenSummary : [];
    const screens = Array.isArray(config.screens) ? config.screens : [];
    const selectedScreenId = state.heatmapPilotResultsScreenId || (screens[0] && screens[0].id) || '';
    const selectedScreen = screens.find(item => item.id === selectedScreenId) || screens[0] || null;
    const selectedSummary = screenSummary.find(item => item.screenId === selectedScreenId) || {};
    const selectedPoints = (data.points || []).filter(point => point.screenId === selectedScreenId);
    const selectedZones = (data.zoneSummaryByScreen && data.zoneSummaryByScreen[selectedScreenId]) || [];

    const sessionMetaNode = document.getElementById('heatmapPilotSessionMeta');
    const kpisNode = document.getElementById('heatmapPilotKpis');
    const counterNode = document.getElementById('heatmapPilotScreenCounter');
    const stageNode = document.getElementById('heatmapPilotScreenStage');
    const prevScreenButton = document.getElementById('heatmapPilotPrevScreenBtn');
    const nextScreenButton = document.getElementById('heatmapPilotNextScreenBtn');
    const insightsNode = document.getElementById('heatmapPilotInsights');

    if (sessionMetaNode) {
      const currentScreen = state.heatmapPilotCurrentScreenId ? getHeatmapPilotScreenConfig_(state.heatmapPilotCurrentScreenId) : null;
      sessionMetaNode.innerHTML = `
        <strong>Sesión activa:</strong> ${escapeHtml(state.heatmapPilotSessionId || 'Aún no iniciada')}
        <br>
        <strong>Estado:</strong> ${escapeHtml(resolveHeatmapPilotTrialStateLabel_())}
        ${currentScreen ? `<br><strong>Pantalla actual:</strong> ${escapeHtml(currentScreen.label)}` : ''}
      `;
    }

    if (kpisNode) {
      const kpis = [
        {
          label: 'Sesiones',
          value: Number(summary.totalSessions || 0).toLocaleString('es-MX'),
          sub: 'Sesiones del flujo completo',
          tone: 'neutral',
          icon: 'sessions'
        },
        {
          label: 'Éxitos flujo',
          value: Number(summary.successSessions || 0).toLocaleString('es-MX'),
          sub: `${Number(summary.successRatePct || 0).toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 })}% completó las 3 pantallas`,
          tone: 'success',
          icon: 'success'
        },
        {
          label: 'Tiempo flujo',
          value: formatHeatmapDuration_(summary.averageTimeToSuccessSeconds),
          sub: 'Promedio para completar el flujo',
          tone: 'time',
          icon: 'time'
        },
        {
          label: 'Bloqueos flujo',
          value: Number(summary.blockedNextClicks || 0).toLocaleString('es-MX'),
          sub: 'Toques bloqueados en todo el recorrido',
          tone: Number(summary.blockedNextClicks || 0) > 0 ? 'danger' : 'neutral',
          icon: 'blocked'
        }
      ];
      kpisNode.innerHTML = kpis.map(item => `
        <div class="kpi-card heatmap-kpi-card heatmap-kpi-card-${escapeHtml(item.tone)}">
          <div class="heatmap-kpi-head">
            <div class="kpi-label">${escapeHtml(item.label)}</div>
            <div class="heatmap-kpi-icon heatmap-kpi-icon-${escapeHtml(item.tone)}">${renderHeatmapPilotKpiIcon_(item.icon)}</div>
          </div>
          <div class="kpi-value heatmap-kpi-value heatmap-kpi-value-${escapeHtml(item.tone)}">${escapeHtml(item.value)}</div>
          <div class="kpi-sub heatmap-kpi-sub">${escapeHtml(item.sub)}</div>
        </div>
      `).join('');
    }

    if (counterNode && selectedScreen) {
      counterNode.textContent = `${selectedScreen.step} de ${screens.length}: ${selectedScreen.label}`;
    }

    if (prevScreenButton) {
      const currentIndex = screens.findIndex(item => item.id === selectedScreenId);
      prevScreenButton.disabled = currentIndex <= 0;
    }

    if (nextScreenButton) {
      const currentIndex = screens.findIndex(item => item.id === selectedScreenId);
      nextScreenButton.disabled = currentIndex === -1 || currentIndex >= screens.length - 1;
    }

    if (stageNode && selectedScreen) {
      stageNode.innerHTML = renderHeatmapPilotScreenStage_(selectedScreen, selectedSummary, selectedPoints, selectedZones);
    }
    if (insightsNode) insightsNode.innerHTML = renderHeatmapPilotInsights(data.insights || [], data.sessions || [], screenSummary);
  }

  function resolveHeatmapPilotTrialStateLabel_() {
    if (state.heatmapPilotTrialState === 'intro') return 'Lista para iniciar';
    if (state.heatmapPilotTrialState === 'flow') return 'En progreso';
    if (state.heatmapPilotTrialState === 'complete') return 'Finalizada';
    return 'Sin sesión';
  }

  function formatHeatmapDuration_(seconds) {
    const totalSeconds = Math.max(0, Number(seconds || 0));
    if (!totalSeconds) return '0s';
    const minutes = Math.floor(totalSeconds / 60);
    const remainingSeconds = totalSeconds % 60;
    if (!minutes) return `${remainingSeconds}s`;
    if (!remainingSeconds) return `${minutes}m`;
    return `${minutes}m ${remainingSeconds}s`;
  }

  function renderHeatmapPilotPrototype() {
    const root = document.getElementById('heatmapPrototypeRoot');
    if (!root) return;
    if (!state.heatmapPilotSessionId || state.heatmapPilotTrialState === 'idle') {
      root.innerHTML = buildHeatmapPilotIntroMarkup_(false);
    } else if (state.heatmapPilotTrialState === 'intro') {
      root.innerHTML = buildHeatmapPilotIntroMarkup_(true);
    } else if (state.heatmapPilotTrialState === 'complete') {
      root.innerHTML = buildHeatmapPilotCompleteMarkup_();
    } else {
      root.innerHTML = buildHeatmapPilotScreenMarkup({
        screenId: state.heatmapPilotCurrentScreenId,
        preview: false,
        points: []
      });
    }
    bindHeatmapPrototypeInteractions(root);
    syncHeatmapPilotNextButton(root);
  }

  function isHeatmapPrototypeMounted_() {
    const root = document.getElementById('heatmapPrototypeRoot');
    return !!(root && (root.querySelector('[data-heatmap-screen]') || root.querySelector('[data-heatmap-stage]')));
  }

  function buildHeatmapPilotIntroMarkup_(started) {
    const intro = getHeatmapPilotDefaultConfig().intro;
    return `
      <div class="heatmap-stage-message" data-heatmap-stage="intro">
        <div class="heatmap-stage-badge">${started ? 'Sesión creada' : 'Modo de prueba'}</div>
        <h3>${escapeHtml(intro.title)}</h3>
        <p>${escapeHtml(intro.body)}</p>
        ${started ? '<button type="button" class="primary heatmap-stage-action" data-action="start-flow">Comenzar prueba</button>' : '<p class="muted-note">Pulsa Iniciar prueba para crear una sesión nueva y mostrar el mensaje de arranque.</p>'}
      </div>
    `;
  }

    const outro = getHeatmapPilotDefaultConfig().outro;
    return `
      <div class="heatmap-stage-message is-success" data-heatmap-stage="complete">
        <div class="heatmap-stage-badge">Prueba finalizada</div>

        </div>

  function buildHeatmapPilotScreenMarkup(options) {
    const safeOptions = options || {};
    const preview = !!safeOptions.preview;
    const screenId = safeOptions.screenId || state.heatmapPilotCurrentScreenId || getHeatmapPilotOrderedScreens_()[0].id;
    const screen = getHeatmapPilotScreenConfig_(screenId);
    const pointsMarkup = (safeOptions.points || []).map(point => `
      <span class="heatmap-point heatmap-point-${escapeAttribute(point.eventType || 'zone_click')}" style="left:${Number(point.x || 0) * 100}%; top:${Number(point.y || 0) * 100}%;" title="${escapeAttribute(point.zoneId || '')}"></span>
    `).join('');

    let content = '';
    if (screenId === 'aviso_privacidad') content = buildHeatmapPrivacyScreen_(preview);
    if (screenId === 'contacto_datos') content = buildHeatmapContactScreen_(preview);
    if (screenId === 'codigo_correo') content = buildHeatmapEmailCodeScreen_(preview);

    return `
      <div class="heatmap-prototype-device${preview ? ' is-preview' : ''}">
        <div class="heatmap-prototype-screen" data-heatmap-screen data-screen-id="${escapeAttribute(screenId)}">
          ${content}
          ${preview ? `<div class="heatmap-points-layer">${pointsMarkup}</div>` : ''}
        </div>
      </div>
    `;

          <button type="button" class="heatmap-choice-pill${geoNo ? ' is-selected is-negative' : ''}" data-zone-id="zone_geo_no" data-action="geo-consent" data-value="no"${preview ? ' tabindex="-1"' : ''}>No</button>
