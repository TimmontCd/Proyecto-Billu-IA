  function buildHeatmapStepperMarkup_(screenId) {
    const currentStep = getHeatmapPilotScreenConfig_(screenId).step;
    return `
      <div class="heatmap-stepper" data-zone-id="zone_stepper">
        ${getHeatmapPilotOrderedScreens_().map(screen => `
          <span class="heatmap-step${screen.id === screenId ? ' is-active' : (screen.step < currentStep ? ' is-complete' : '')}">${screen.step}</span>
        `).join('')}
      </div>
    `;
  }

  function bindHeatmapPrototypeInteractions(root) {
    if (!root) return;

    root.querySelectorAll('.heatmap-stage-action').forEach(button => {
      button.addEventListener('click', async () => {
        const action = button.dataset.action;
        if (action === 'start-flow') {
          goToHeatmapPilotScreen_(getHeatmapPilotOrderedScreens_()[0].id, true);
        }
        if (action === 'open-results') {
          setHeatmapPilotSubView('results');
          await loadHeatmapPilotDashboard(true);
        }
        if (action === 'restart-flow') {
          startHeatmapPilotSession(true);
        }
      });
    });

    const screenNode = root.querySelector('[data-heatmap-screen]');
    if (!screenNode) return;

    screenNode.addEventListener('click', event => {
      const target = event.target.closest('[data-zone-id], [data-action]');
      const inputTarget = event.target.closest('input');
      if (inputTarget) return;
      const zoneId = target && target.dataset.zoneId ? target.dataset.zoneId : 'zone_blank_area';
      const action = target && target.dataset.action ? target.dataset.action : 'zone-click';
      const point = resolveHeatmapPilotInteractionPoint_(event, target, screenNode);
      const currentScreenId = state.heatmapPilotCurrentScreenId;

      if (action === 'toggle-help') {
        toggleHeatmapPilotTooltip(root, target.dataset.helpKey || '');
        trackHeatmapPilotEvent({ screenId: currentScreenId, eventType: 'help_open', zoneId: zoneId, x: point.x, y: point.y }, { refresh: true });
        return;
      }

      if (action === 'go-back') {
        trackHeatmapPilotEvent({ screenId: currentScreenId, eventType: 'back_click', zoneId: zoneId, x: point.x, y: point.y }, { refresh: true });
        handleHeatmapPilotBack_();
        return;
      }

      if (action === 'cancel-flow') {
        trackHeatmapPilotEvent({ screenId: currentScreenId, eventType: 'zone_click', zoneId: zoneId, x: point.x, y: point.y, outcome: 'cancel' }, { refresh: true });
        state.heatmapPilotTrialState = 'intro';
        renderHeatmapPilotPrototype();
        setHeatmapPilotStatus('info', 'Volviste al inicio de la prueba.');
        return;
      }

      if (action === 'privacy-consent' || action === 'geo-consent') {
        const key = action === 'privacy-consent' ? 'privacyConsent' : 'geolocationConsent';
        state.heatmapPilotForm[key] = target.dataset.value || '';
        renderHeatmapPilotPrototype();
        trackHeatmapPilotEvent({ screenId: currentScreenId, eventType: 'select_option', zoneId: zoneId, x: point.x, y: point.y, outcome: state.heatmapPilotForm[key] }, { refresh: true });
        return;
      }

      if (action === 'resend-code') {
        setHeatmapPilotStatus('info', 'Reenvío simulado. El piloto registró la intención de volver a solicitar el código.');
        trackHeatmapPilotEvent({ screenId: currentScreenId, eventType: 'help_open', zoneId: zoneId, x: point.x, y: point.y, outcome: 'resend' }, { refresh: true });
        return;
      }

      if (action === 'continue-flow') {
        if (!isHeatmapPilotReadyForScreen_(currentScreenId)) {
          setHeatmapPilotStatus('warning', `Completa lo necesario en ${getHeatmapPilotScreenConfig_(currentScreenId).label} para continuar.`);
          trackHeatmapPilotEvent({ screenId: currentScreenId, eventType: 'next_blocked_click', zoneId: zoneId, x: point.x, y: point.y, buttonState: 'disabled', outcome: 'blocked' }, { refresh: true });
          return;
        }
        trackHeatmapPilotEvent({ screenId: currentScreenId, eventType: 'next_click', zoneId: zoneId, x: point.x, y: point.y, buttonState: 'enabled', outcome: 'success' }, { refresh: false });
        trackHeatmapPilotEvent({ screenId: currentScreenId, eventType: 'screen_success', zoneId: zoneId, x: point.x, y: point.y, buttonState: 'enabled', outcome: 'success' }, { refresh: true });
        advanceHeatmapPilotFlow_();
        return;
      }

      if (action === 'complete-flow') {
        if (!isHeatmapPilotReadyForScreen_(currentScreenId)) {
          setHeatmapPilotStatus('warning', 'Captura un código de 6 dígitos para finalizar la prueba.');
          trackHeatmapPilotEvent({ screenId: currentScreenId, eventType: 'next_blocked_click', zoneId: zoneId, x: point.x, y: point.y, buttonState: 'disabled', outcome: 'blocked' }, { refresh: true });
          return;
        }
        trackHeatmapPilotEvent({ screenId: currentScreenId, eventType: 'next_click', zoneId: zoneId, x: point.x, y: point.y, buttonState: 'enabled', outcome: 'success' }, { refresh: false });
        trackHeatmapPilotEvent({ screenId: currentScreenId, eventType: 'task_success', zoneId: zoneId, x: point.x, y: point.y, buttonState: 'enabled', outcome: 'success' }, { refresh: true });
        finishHeatmapPilotFlow_();
        return;
      }

      trackHeatmapPilotEvent({ screenId: currentScreenId, eventType: 'zone_click', zoneId: zoneId, x: point.x, y: point.y }, { refresh: true });
    });

    screenNode.addEventListener('focusin', event => {
      if (!event.target.matches('input')) return;
      const fieldName = event.target.name || '';
      const point = resolveHeatmapPilotPointFromElement_(event.target, screenNode);
      trackHeatmapPilotEvent({
        screenId: state.heatmapPilotCurrentScreenId,
        eventType: 'input_focus',
        zoneId: resolveHeatmapFieldZone_(state.heatmapPilotCurrentScreenId, fieldName),
        fieldName: fieldName,
        x: point.x,
        y: point.y
      }, { refresh: false });
    });

    screenNode.addEventListener('input', event => {
      if (!event.target.matches('input')) return;
      const fieldName = event.target.name || '';
      if (fieldName === 'phone') event.target.value = String(event.target.value || '').replace(/[^\d]/g, '').slice(0, 10);
      if (fieldName === 'emailCode') event.target.value = String(event.target.value || '').replace(/[^\d]/g, '').slice(0, 6);
      state.heatmapPilotForm[fieldName] = event.target.value || '';
      syncHeatmapPilotNextButton(root);
    });

    screenNode.addEventListener('change', event => {
      if (!event.target.matches('input')) return;
      const fieldName = event.target.name || '';
      const point = resolveHeatmapPilotPointFromElement_(event.target, screenNode);
      const value = event.target.value || '';
      state.heatmapPilotForm[fieldName] = value;
      syncHeatmapPilotNextButton(root);
      trackHeatmapPilotEvent({
        screenId: state.heatmapPilotCurrentScreenId,
        eventType: 'input_change',
        zoneId: resolveHeatmapFieldZone_(state.heatmapPilotCurrentScreenId, fieldName),
        fieldName: fieldName,
        x: point.x,
        y: point.y,
        outcome: value ? 'filled' : 'empty'
      }, { refresh: true });
    });
  }

  function handleHeatmapPilotBack_() {
    const currentIndex = getHeatmapPilotScreenIndex_(state.heatmapPilotCurrentScreenId);
    if (currentIndex <= 0) {
      state.heatmapPilotTrialState = 'intro';
      renderHeatmapPilotPrototype();
      return;
    }
    const previous = getHeatmapPilotOrderedScreens_()[currentIndex - 1];
    if (previous) {
      state.heatmapPilotCurrentScreenId = previous.id;
      state.heatmapPilotTrialState = 'flow';
      renderHeatmapPilotPrototype();
    }
  }

  function resolveHeatmapFieldZone_(screenId, fieldName) {
    if (screenId === 'contacto_datos') {
      if (fieldName === 'phone') return 'zone_phone_input';
      if (fieldName === 'email') return 'zone_email_input';
      return 'zone_rewards_input';
    }
    return 'zone_code_input';
  }

  function syncHeatmapPilotNextButton(root) {
    if (!root) return;
    root.querySelectorAll('.heatmap-next-button').forEach(button => {
      const currentScreen = state.heatmapPilotCurrentScreenId || '';
      const enabled = isHeatmapPilotReadyForScreen_(currentScreen);
      button.classList.toggle('is-enabled', enabled);
      button.classList.toggle('is-disabled', !enabled);
      button.setAttribute('aria-disabled', enabled ? 'false' : 'true');
    });
  }

  function isHeatmapPilotReadyForScreen_(screenId) {
    const form = state.heatmapPilotForm || {};
    if (screenId === 'aviso_privacidad') {
      return form.privacyConsent === 'yes' && form.geolocationConsent === 'yes';
    }
    if (screenId === 'contacto_datos') {
      return String(form.phone || '').trim().length >= 10 && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(form.email || '').trim());
    }
    if (screenId === 'codigo_correo') {
      return String(form.emailCode || '').trim().length === 6;
    }
    return false;
  }

  function toggleHeatmapPilotTooltip(root, key) {
    root.querySelectorAll('.heatmap-tooltip').forEach(node => node.classList.add('hidden-panel'));
    const tooltip = root.querySelector(`.heatmap-tooltip.${key}`);
    if (tooltip) tooltip.classList.toggle('hidden-panel');
  }

  function resolveHeatmapPilotPoint_(event, screenNode) {
    const rect = screenNode.getBoundingClientRect();
    return {
      x: Math.max(0, Math.min(1, (event.clientX - rect.left) / (rect.width || 1))),
      y: Math.max(0, Math.min(1, (event.clientY - rect.top) / (rect.height || 1)))
    };
  }

  function resolveHeatmapPilotInteractionPoint_(event, target, screenNode) {
    if (target && target.dataset && target.dataset.zoneId) {
      return resolveHeatmapPilotPointFromElement_(target, screenNode);
    }
    return resolveHeatmapPilotPoint_(event, screenNode);
  }

  function resolveHeatmapPilotPointFromElement_(element, screenNode) {
    const screenRect = screenNode.getBoundingClientRect();
    const rect = element.getBoundingClientRect();
    return {
      x: Math.max(0, Math.min(1, ((rect.left + rect.width / 2) - screenRect.left) / (screenRect.width || 1))),
      y: Math.max(0, Math.min(1, ((rect.top + rect.height / 2) - screenRect.top) / (screenRect.height || 1)))
    };
  }

  function trackHeatmapPilotEvent(payload, options) {
    if (!state.heatmapPilotSessionId) return Promise.resolve();
    const config = (state.heatmapPilot && state.heatmapPilot.config) || getHeatmapPilotDefaultConfig();
    const safeOptions = options || {};
    const eventPayload = Object.assign({
      prototypeId: config.prototypeId,
      screenId: payload && payload.screenId ? payload.screenId : state.heatmapPilotCurrentScreenId,
      variantId: config.variantId,
      sessionId: state.heatmapPilotSessionId
    }, payload || {});

    if (state.heatmapPilotBackendAvailable === false) {
      saveLocalHeatmapPilotEvent_(eventPayload);
      if (safeOptions.refresh !== false) scheduleHeatmapPilotRefresh_();
      return Promise.resolve();
    }

    return server('savePrototypeHeatmapEventController', eventPayload)
      .then(response => {
        handleResponse(response);
        if (safeOptions.refresh !== false) scheduleHeatmapPilotRefresh_();
      })
      .catch(() => {
        state.heatmapPilotBackendAvailable = false;
        saveLocalHeatmapPilotEvent_(eventPayload);
        if (safeOptions.refresh !== false) scheduleHeatmapPilotRefresh_();
        setHeatmapPilotStatus('warning', 'El backend del piloto no respondió; guardamos esta sesión en local para que no pierdas la prueba.');
      });
  }

  function scheduleHeatmapPilotRefresh_() {
    clearTimeout(state.heatmapPilotRefreshTimer);
    state.heatmapPilotRefreshTimer = setTimeout(() => {
      loadHeatmapPilotDashboard(true);
    }, 450);
  }

  function renderHeatmapPilotPreview(screenId, points) {
    return buildHeatmapPilotScreenMarkup({
      screenId: screenId,
      preview: true,
      points: points || []
    });
  }

  function renderHeatmapPilotScreenStage_(screen, summary, points, zones) {
    return `
      <div class="heatmap-screen-stage-card">
        <div class="heatmap-screen-stage-preview">
          <div class="heatmap-preview-card heatmap-screen-preview is-stage">
            <div class="heatmap-preview-meta">
              <span>Heatmap sobre pantalla base</span>
              <span><strong>${escapeHtml(Number(points.length || 0).toLocaleString('es-MX'))} puntos</strong></span>
            </div>
            <div class="heatmap-screen-preview-frame is-stage">
              ${renderHeatmapPilotPreview(screen.id, points)}
            </div>
          </div>
        </div>
        <div class="heatmap-screen-stage-detail">
          <div class="heatmap-screen-result-head">
            <div>
              <div class="section-kicker">Pantalla ${escapeHtml(String(screen.step || ''))}</div>
              <h4>${escapeHtml(screen.label || '')}</h4>
            </div>
            <div class="heatmap-screen-result-meta">
              <span>${escapeHtml(Number(summary.totalSessions || 0).toLocaleString('es-MX'))} sesiones</span>
              <span>${escapeHtml(Number(points.length || 0).toLocaleString('es-MX'))} puntos</span>
            </div>
          </div>
          <div class="heatmap-screen-result-kpis">
            <div class="heatmap-inline-kpi">
              <span>Completado</span>
              <strong>${escapeHtml(Number(summary.completionRatePct || 0).toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 }))}%</strong>
            </div>
            <div class="heatmap-inline-kpi">
              <span>Tiempo promedio</span>
              <strong>${escapeHtml(formatHeatmapDuration_(summary.averageCompletionSeconds))}</strong>
            </div>
            <div class="heatmap-inline-kpi">
              <span>Bloqueos</span>
              <strong>${escapeHtml(Number(summary.blockedNextClicks || 0).toLocaleString('es-MX'))}</strong>
            </div>
          </div>
          <div class="heatmap-screen-result-detail">
            <div>
              <div class="heatmap-session-summary-title">Detalle de pantalla</div>
              <div class="heatmap-screen-detail-grid">
                <div class="heatmap-screen-detail-item">
                  <span>Sesiones completadas</span>
                  <strong>${escapeHtml(Number(summary.completedSessions || 0).toLocaleString('es-MX'))} / ${escapeHtml(Number(summary.totalSessions || 0).toLocaleString('es-MX'))}</strong>
                </div>
                <div class="heatmap-screen-detail-item">
                  <span>Tiempo promedio</span>
                  <strong>${escapeHtml(formatHeatmapDuration_(summary.averageCompletionSeconds))}</strong>
                </div>
                <div class="heatmap-screen-detail-item">
                  <span>Bloqueos</span>
                  <strong>${escapeHtml(Number(summary.blockedNextClicks || 0).toLocaleString('es-MX'))}</strong>
                </div>
              </div>
            </div>
            <div>
              <div class="heatmap-session-summary-title">Top zonas</div>
              ${renderHeatmapPilotCompactZones_(zones)}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderHeatmapPilotCompactZones_(rows) {
    const items = Array.isArray(rows) ? rows.filter(row => Number(row.interactions || 0) > 0).slice(0, 4) : [];
    if (!items.length) {
      return '<div class="empty">Sin interacción visible todavía.</div>';
    }
    return `
      <div class="heatmap-compact-zone-list">
        ${items.map(row => `
          <div class="heatmap-compact-zone-item">
            <strong>${escapeHtml(row.label || row.zoneId || '')}</strong>
            <span>${escapeHtml(Number(row.interactions || 0).toLocaleString('es-MX'))} interacciones</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  function renderHeatmapPilotZoneSummary(rows) {
    if (!rows || !rows.length) {
      return '<div class="empty">Aún no hay interacción por zona.</div>';
    }
    return `
      <div class="heatmap-zone-list">
        ${rows.map(row => `
          <div class="heatmap-zone-row">
            <div>
              <strong>${escapeHtml(row.label || row.zoneId || '')}</strong>
              <small>${escapeHtml(row.category || '')}</small>
            </div>
            <div class="heatmap-zone-metrics">
              <span>${escapeHtml(Number(row.interactions || 0).toLocaleString('es-MX'))} interacciones</span>
              <span>${escapeHtml(Number(row.firstClicks || 0).toLocaleString('es-MX'))} primer clic</span>
              <span>${escapeHtml(Number(row.uniqueSessions || 0).toLocaleString('es-MX'))} sesiones</span>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function renderHeatmapPilotInsights(insights, sessions, screenSummary) {
    const safeInsights = Array.isArray(insights) ? insights : [];
    return `
      <div class="heatmap-insight-list">
        ${safeInsights.map(item => {
          const meta = resolveHeatmapPilotInsightMeta_(item);
          return `
            <div class="heatmap-insight-item heatmap-insight-item-${escapeHtml(meta.tone)}">
              <strong>${escapeHtml(meta.title)}</strong>
              <span>${escapeHtml(item)}</span>
            </div>
          `;
        }).join('') || '<div class="empty">Sin hallazgos por ahora.</div>'}
      </div>
    `;
  }

  function renderHeatmapPilotKpiIcon_(icon) {
    if (icon === 'success') {
      return `
        <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
          <path d="M16.5 5.5 8.4 13.6 4.8 10" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      `;
    }
    if (icon === 'time') {
      return `
        <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
          <circle cx="10" cy="10" r="6.6" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <path d="M10 6.4v4.1l2.7 1.8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      `;
    }
    if (icon === 'blocked') {
      return `
        <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
          <path d="M10 3.2 16.2 5.6v4.3c0 3.4-2.2 5.7-6.2 7-4-1.3-6.2-3.6-6.2-7V5.6L10 3.2Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M10 7.1v3.2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="10" cy="13.1" r="1" fill="currentColor"/>
        </svg>
      `;
    }
    return `
      <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
        <rect x="3.5" y="4.6" width="13" height="10.8" rx="2.4" fill="none" stroke="currentColor" stroke-width="1.8"/>
        <path d="M6.4 8.1h4.8M6.4 11.3h7.2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    `;
  }

  function resolveHeatmapPilotInsightMeta_(text) {
    const content = String(text || '').toLowerCase();
    if (content.includes('más tiempo') || content.includes('toma más tiempo')) {
      return { title: 'Cuello de botella detectado', tone: 'warning' };
    }
    if (content.includes('menor tasa de completado') || content.includes('menor completado')) {
      return { title: 'Punto de fuga crítico', tone: 'danger' };
    }
    return { title: 'Señal operativa', tone: 'neutral' };
  }

  function setHeatmapPilotStatus(type, message) {
    const node = document.getElementById('heatmapPilotStatus');
    if (!node) return;
    node.className = `status-banner ${type || 'info'}`;
    node.textContent = message || '';
    if (!message) node.classList.add('hidden');
    else node.classList.remove('hidden');
  }

  function getHeatmapPilotStorageKey_() {
    return 'billu_heatmap_pilot_flow_v2';
  }

  function readLocalHeatmapPilotEvents_() {
    try {
      return JSON.parse(window.localStorage.getItem(getHeatmapPilotStorageKey_()) || '[]');
    } catch (error) {
      return [];
    }
  }

  function writeLocalHeatmapPilotEvents_(rows) {
    window.localStorage.setItem(getHeatmapPilotStorageKey_(), JSON.stringify(rows || []));
  }

  function saveLocalHeatmapPilotEvent_(payload) {
    const rows = readLocalHeatmapPilotEvents_();
    rows.push(Object.assign({}, payload, { createdAt: new Date().toISOString() }));
    writeLocalHeatmapPilotEvents_(rows.slice(-1500));
  }

  function buildLocalHeatmapPilotDashboard_() {
    const config = getHeatmapPilotDefaultConfig();
    const rows = readLocalHeatmapPilotEvents_()
      .filter(row => row.prototypeId === config.prototypeId && row.variantId === config.variantId)
      .sort((left, right) => new Date(left.createdAt || 0).getTime() - new Date(right.createdAt || 0).getTime());
    const sessionMap = buildLocalHeatmapSessionMap_(rows);
    const sessionIds = Object.keys(sessionMap);
    const successSessions = sessionIds.filter(sessionId => sessionMap[sessionId].hasSuccess);
    const screenSummary = config.screens.map(screen => {
      const screenRows = rows.filter(row => row.screenId === screen.id);
      const sessions = [...new Set(screenRows.map(row => row.sessionId))];
      const completed = sessions.filter(sessionId => buildLocalHasScreenSuccess_(sessionMap[sessionId], screen.id));
      return {
        screenId: screen.id,
        label: screen.label,
        step: screen.step,
        totalEvents: screenRows.length,
        totalSessions: sessions.length,
        completedSessions: completed.length,
        completionRatePct: sessions.length ? Math.round((completed.length / sessions.length) * 10000) / 100 : 0,
        blockedNextClicks: screenRows.filter(row => row.eventType === 'next_blocked_click').length,
        averageCompletionSeconds: calculateLocalHeatmapAverageScreenTime_(sessionMap, screen.id)
      };
    });
    const zoneSummaryByScreen = {};
    config.screens.forEach(screen => {
      const screenRows = rows.filter(row => row.screenId === screen.id);
      const firstZoneBySession = {};
      [...new Set(screenRows.map(row => row.sessionId))].forEach(sessionId => {
        const first = screenRows.find(row => row.sessionId === sessionId && ['zone_click', 'input_focus', 'help_open', 'next_click', 'next_blocked_click', 'back_click', 'select_option'].includes(row.eventType) && row.zoneId);
        if (first) firstZoneBySession[sessionId] = first.zoneId;
      });
      zoneSummaryByScreen[screen.id] = (screen.zones || []).map(zone => {
        const zoneRows = screenRows.filter(row => row.zoneId === zone.id && row.eventType !== 'screen_view');
        const uniqueSessions = [...new Set(zoneRows.map(row => row.sessionId))];
        return {
          zoneId: zone.id,
          label: zone.label,
          category: zone.category,
          interactions: zoneRows.length,
          uniqueSessions: uniqueSessions.length,
          firstClicks: Object.keys(firstZoneBySession).filter(sessionId => firstZoneBySession[sessionId] === zone.id).length,
          successSessions: uniqueSessions.filter(sessionId => buildLocalHasScreenSuccess_(sessionMap[sessionId], screen.id)).length
        };
      }).sort((left, right) => right.interactions - left.interactions);
    });
    return {
      config: config,
      filters: {
        prototypeId: config.prototypeId,
        variantId: config.variantId
      },
      summary: {
        totalEvents: rows.length,
        totalSessions: sessionIds.length,
        successSessions: successSessions.length,
        successRatePct: sessionIds.length ? Math.round((successSessions.length / sessionIds.length) * 10000) / 100 : 0,
        blockedNextClicks: rows.filter(row => row.eventType === 'next_blocked_click').length,
        helpOpenCount: rows.filter(row => row.eventType === 'help_open').length,
        averageTimeToSuccessSeconds: calculateLocalHeatmapAverageTime_(sessionMap)
      },
      screenSummary: screenSummary,
      zoneSummaryByScreen: zoneSummaryByScreen,
      points: rows
        .filter(row => ['zone_click', 'input_focus', 'help_open', 'next_click', 'next_blocked_click', 'validation_error', 'back_click', 'select_option'].includes(row.eventType) && row.x !== undefined && row.y !== undefined && row.x !== '' && row.y !== '')
        .slice(-600)
        .map(row => ({
          screenId: row.screenId || '',
          x: Number(row.x || 0),
          y: Number(row.y || 0),
          zoneId: row.zoneId || '',
          eventType: row.eventType || '',
          createdAt: row.createdAt || ''
        })),
      sessions: sessionIds.map(sessionId => ({
        sessionId: sessionId,
        startedAt: sessionMap[sessionId].startedAt || '',
        hasSuccess: sessionMap[sessionId].hasSuccess,
        durationSeconds: sessionMap[sessionId].durationSeconds,
        eventCount: sessionMap[sessionId].rows.length,
        screenDurations: buildLocalHeatmapScreenDurationSummary_(sessionMap[sessionId].screenDurationsById)
      })).sort((left, right) => new Date(right.startedAt || 0).getTime() - new Date(left.startedAt || 0).getTime()).slice(0, 12),
      insights: buildLocalHeatmapInsights_(rows, screenSummary)
    };
  }

  function buildLocalHeatmapSessionMap_(rows) {
    const sessionMap = rows.reduce((acc, row) => {
      const sessionId = row.sessionId || 'UNKNOWN';
      if (!acc[sessionId]) {
        acc[sessionId] = { rows: [], hasSuccess: false, startedAt: '', durationSeconds: 0, screenDurationsById: {} };
      }
      acc[sessionId].rows.push(row);
      if (!acc[sessionId].startedAt || new Date(row.createdAt || 0).getTime() < new Date(acc[sessionId].startedAt || 0).getTime()) {
        acc[sessionId].startedAt = row.createdAt || '';
      }
      if (row.eventType === 'task_success') {
        acc[sessionId].hasSuccess = true;
        const first = new Date(acc[sessionId].rows[0].createdAt || 0).getTime();
        const last = new Date(row.createdAt || 0).getTime();
        acc[sessionId].durationSeconds = first && last && last >= first ? Math.round((last - first) / 1000) : 0;
      }
      return acc;
    }, {});
    Object.keys(sessionMap).forEach(sessionId => {
      sessionMap[sessionId].screenDurationsById = buildLocalHeatmapScreenDurations_(sessionMap[sessionId].rows);
    });
    return sessionMap;
  }

  function buildLocalHasScreenSuccess_(sessionItem, screenId) {
    if (!sessionItem || !Array.isArray(sessionItem.rows)) return false;
    return sessionItem.rows.some(row => row.screenId === screenId && (row.eventType === 'screen_success' || row.eventType === 'task_success'));
  }

  function calculateLocalHeatmapAverageTime_(sessionMap) {
    const durations = Object.keys(sessionMap).map(sessionId => sessionMap[sessionId].hasSuccess ? Number(sessionMap[sessionId].durationSeconds || 0) : null).filter(value => value !== null);
    if (!durations.length) return 0;
    return Math.round(durations.reduce((sum, value) => sum + value, 0) / durations.length);
  }

  function calculateLocalHeatmapAverageScreenTime_(sessionMap, screenId) {
    const durations = Object.keys(sessionMap).map(sessionId => {
      const session = sessionMap[sessionId];
      if (!session || !session.screenDurationsById) return null;
      const value = session.screenDurationsById[screenId];
      return value === undefined || value === null ? null : Number(value);
    }).filter(value => value !== null && Number.isFinite(value));
    if (!durations.length) return 0;
    return Math.round(durations.reduce((sum, value) => sum + value, 0) / durations.length);
  }

  function buildLocalHeatmapScreenDurations_(rows) {
    const screens = getHeatmapPilotOrderedScreens_();
    const durations = {};
    screens.forEach(screen => {
      const screenRows = (rows || []).filter(row => row.screenId === screen.id);
      if (!screenRows.length) return;
      const startRow = screenRows.find(row => row.eventType === 'screen_view') || screenRows[0];
      const endRow = screenRows.find(row => row.eventType === 'screen_success' || row.eventType === 'task_success');
      if (!startRow || !endRow) return;
      const start = new Date(startRow.createdAt || 0).getTime();
      const end = new Date(endRow.createdAt || 0).getTime();
      if (!start || !end || end < start) return;
      durations[screen.id] = Math.round((end - start) / 1000);
    });
    return durations;
  }

  function buildLocalHeatmapScreenDurationSummary_(screenDurationsById) {
    return getHeatmapPilotOrderedScreens_().map(screen => ({
      screenId: screen.id,
      label: screen.label,
      seconds: screenDurationsById && screenDurationsById[screen.id] !== undefined ? Number(screenDurationsById[screen.id] || 0) : null
    }));
  }

  function buildLocalHeatmapInsights_(rows, screenSummary) {
    const insights = [];
    if (!rows.length) {
      insights.push('El piloto aún no tiene eventos guardados en este navegador. Inicia una sesión y recorre el flujo para comenzar a pintar el heatmap.');
      return insights;
    }
    const blockedScreen = screenSummary.slice().sort((left, right) => Number(right.blockedNextClicks || 0) - Number(left.blockedNextClicks || 0))[0];
    if (blockedScreen && Number(blockedScreen.blockedNextClicks || 0) > 0) {
      insights.push(`La mayor fricción actual aparece en ${blockedScreen.label} con ${blockedScreen.blockedNextClicks} intento(s) bloqueados.`);
    }
    const weakestScreen = screenSummary.slice().sort((left, right) => Number(left.completionRatePct || 0) - Number(right.completionRatePct || 0))[0];
    if (weakestScreen && Number(weakestScreen.totalSessions || 0) > 0) {
      insights.push(`La pantalla con menor tasa de completado es ${weakestScreen.label} con ${weakestScreen.completionRatePct}%.`);
    }
    const slowestScreen = screenSummary.filter(item => Number(item.averageCompletionSeconds || 0) > 0).sort((left, right) => Number(right.averageCompletionSeconds || 0) - Number(left.averageCompletionSeconds || 0))[0];
    if (slowestScreen) {
      insights.push(`La pantalla que hoy toma más tiempo en completarse es ${slowestScreen.label} con ${slowestScreen.averageCompletionSeconds}s en promedio.`);
    }
    if (!insights.length) {
      insights.push('El flujo ya tiene eventos suficientes para comparar pantallas. Sigue sumando sesiones para estabilizar el patrón.');
    }
    return insights;
  }

      if (looksTransient && safeAttempt < 1) {
        setCampaignStatus('info', 'La conexión tardó más de lo esperado. Reintentando campañas...');

        return loadCampaignProgrammingDashboard(true, safeAttempt + 1);

      state.campaignsPreview = null;
      renderCampaignProgrammingDashboard(null, errorMessage);

  async function buildDocumentComparisonPayload(form) {
    const payload = formToObject(form);
    const documentA = await resolveComparisonDocument({
      side: 'A',
      name: payload.documentAName,
      text: payload.documentAText,
      fileInputId: 'documentAFile'
    });
    const documentB = await resolveComparisonDocument({
      side: 'B',
      name: payload.documentBName,
      text: payload.documentBText,
      fileInputId: 'documentBFile'
    });

    return {
      preferredTarget: payload.preferredTarget || 'A',
      notes: payload.notes || '',
      documentA: documentA,
      documentB: documentB
    };
  }

  async function resolveComparisonDocument(options) {
    const fileInput = document.getElementById(options.fileInputId);
    const file = fileInput && fileInput.files && fileInput.files.length ? fileInput.files[0] : null;
    const manualText = String(options.text || '').trim();

    if (!manualText && !file) {
      throw new Error(`Carga el Documento ${options.side} o pega su contenido.`);
    }

    if (manualText) {
      updateDocumentStatus(options.side, 'Texto manual listo para análisis.');
      return {
        name: String(options.name || (file && file.name) || `Documento ${options.side}`).trim(),
        text: manualText,
        pageCount: 0
      };
    }

    if (!file) {
      throw new Error(`No se encontró archivo para el Documento ${options.side}.`);
    }

    updateDocumentStatus(options.side, 'Extrayendo texto del PDF...');
    const extraction = await extractPdfText(file);
    updateDocumentStatus(options.side, `${file.name} listo. ${extraction.pageCount} páginas analizadas.`);

    return {
      name: String(options.name || file.name || `Documento ${options.side}`).trim(),
      text: extraction.text,
      pageCount: extraction.pageCount
    };
  }

  function getFilteredConversionAgentRecipients_(rows) {
    const step = String(state.conversionAgentFilters.step || '').trim();
    const search = String(state.conversionAgentFilters.search || '').trim().toLowerCase();
    return (rows || []).filter(row => {
      if (step && String(row.nextStep || '') !== step) return false;
      if (!search) return true;
      const haystack = [
        row.fullName,
        row.firstName,
        row.email,
        row.nextStep,
        row.action
      ].join(' ').toLowerCase();
      return haystack.includes(search);
    });
  }

  function resolveConversionSendStatus_(row) {
    if (row.sendStatus) return row.sendStatus;
    if (row.readyToSend) return 'Listo para enviar';
    if (row.nextStep && !row.hasGuide) return 'Sin guía configurada';
    return 'Incompleto';

  async function sendConversionAgentBatch() {
    try {
      const stepFilter = state.conversionAgentFilters.step || '';
      const filteredRows = getFilteredConversionAgentRecipients_(state.conversionAgent && state.conversionAgent.recipients ? state.conversionAgent.recipients : [])
        .filter(row => row.readyToSend && (!stepFilter || row.nextStep === stepFilter));
      if (!filteredRows.length) {
        showToast('No hay registros listos para envío con el filtro actual.');
        return;
      }
      const confirmation = window.confirm(`Se enviarán ${filteredRows.length.toLocaleString('es-MX')} correos del filtro actual. ¿Deseas continuar?`);
      if (!confirmation) return;
      showProcessingModal(
        'Enviando correos',
        'Estamos enviando la guía a todos los registros listos del filtro seleccionado.'
      );
      const response = await server('sendConversionAgentBatchController', {
        stepFilter: stepFilter,
        rowNumbers: filteredRows.map(row => Number(row.rowNumber || 0)).filter(Boolean)
      });
      handleResponse(response);
      const failures = Number(response.data.failed || 0);
      const sent = Number(response.data.sent || 0);
      const evaluated = Number(response.data.totalEvaluated || 0);
      const suffix = failures ? ` Hubo ${failures.toLocaleString('es-MX')} errores.` : '';
      setConversionAgentStatus(failures ? 'warning' : 'success', `Se procesaron ${evaluated.toLocaleString('es-MX')} registros y se enviaron ${sent.toLocaleString('es-MX')} correos.${suffix}`);
      showToast(`Agente de Conversión: ${sent.toLocaleString('es-MX')} correos enviados de ${evaluated.toLocaleString('es-MX')} registros.`);
      if (response.data && Array.isArray(response.data.failures) && response.data.failures.length) {
        console.warn('Conversion batch failures', response.data.failures);
      }
      await loadConversionAgentDashboard(true);
    } catch (error) {
      setConversionAgentStatus('error', error.message || 'No fue posible ejecutar el envío masivo.');
      showToast(error.message || 'No fue posible ejecutar el envío masivo.');
    } finally {
      hideProcessingModal();
    }
  }

  function getFilteredWhatsAppAgentRecipients_(rows) {
    const search = String((state.whatsappAgentFilters && state.whatsappAgentFilters.search) || '').trim().toLowerCase();
    const source = String((state.whatsappAgentFilters && state.whatsappAgentFilters.source) || '').trim().toUpperCase();
    const step = String((state.whatsappAgentFilters && state.whatsappAgentFilters.step) || '').trim();
    return (rows || []).filter(row => {
      if (step && row.nextStep !== step) return false;
      if (source === 'META' && !row.isMetaLead) return false;
      if (source === 'HUMANO' && !row.needsHuman) return false;
      if (source === 'VENTANA24' && !row.within24hWindow) return false;
      if (source === 'LISTOS' && !row.readyToAssist) return false;
      if (!search) return true;
      const haystack = [
        row.fullName,
        row.firstName,
        row.email,
        row.phone,
        row.origin,
        row.nextStep,
        row.lastMessage
      ].join(' ').toLowerCase();
      return haystack.includes(search);
    });
  }

  async function sendWhatsAppOutboundCampaign() {
    try {
      const campaign = state.whatsappAgent && state.whatsappAgent.campaign ? state.whatsappAgent.campaign : null;
      if (!campaign) throw new Error('No fue posible cargar la configuración de la campaña outbound.');
      if (campaign.error) throw new Error(campaign.error);
      if (!campaign.apiConfigured) throw new Error('Falta configurar WHATSAPP_ACCESS_TOKEN y/o WHATSAPP_PHONE_NUMBER_ID en Script Properties.');
      const eligible = Number(campaign.eligible || 0);
      const retryableAlreadySent = Number(campaign.retryableAlreadySent || 0);
      let includeAlreadySent = false;

      if (eligible < 1) {
        if (retryableAlreadySent < 1) {
          showToast('No hay registros elegibles para campaña outbound.');
          return;
        }
        const retryConfirmation = await showConfirmModal({
          title: 'No hay elegibles nuevos',
          message: `No hay contactos nuevos para enviar.\n¿Deseas reintentar ${retryableAlreadySent.toLocaleString('es-MX')} ya marcados como ENVIADO?`,
          confirmText: 'Sí, reintentar',
          cancelText: 'Cancelar',
          tone: 'warning'
        });
        if (!retryConfirmation) return;
        includeAlreadySent = true;
      }
      if (!includeAlreadySent) {
        const confirmation = await showConfirmModal({
          title: 'Confirmar campaña outbound',
          message: `Se enviará la campaña outbound a ${eligible.toLocaleString('es-MX')} registros de ${campaign.sheetName || 'CampañaEnrolamiento'}.`,
          confirmText: 'Enviar campaña',
          cancelText: 'Cancelar',
          tone: 'info'
        });
        if (!confirmation) return;
      }

      showProcessingModal(
        'Enviando campaña outbound',
        includeAlreadySent
          ? `Estamos reintentando ${retryableAlreadySent.toLocaleString('es-MX')} registros previamente enviados.`
          : `Estamos enviando WhatsApp a ${eligible.toLocaleString('es-MX')} registros elegibles.`
      );
      const response = await server('runWhatsAppOutboundCampaignController', { includeAlreadySent });
      handleResponse(response);

      const attempted = Number(response.data && response.data.attempted || 0);
      const sent = Number(response.data && response.data.sent || 0);
      const failed = Number(response.data && response.data.failed || 0);
      const suffix = failed ? ` Se detectaron ${failed.toLocaleString('es-MX')} errores.` : '';
      setWhatsAppAgentStatus(
        failed ? 'warning' : 'success',
        `${includeAlreadySent ? 'Reintento outbound' : 'Campaña outbound'} procesada: ${sent.toLocaleString('es-MX')} enviados de ${attempted.toLocaleString('es-MX')}.${suffix}`
      );
      showToast(`${includeAlreadySent ? 'Reintento WhatsApp' : 'WhatsApp outbound'}: ${sent.toLocaleString('es-MX')} enviados.`);
      if (response.data && Array.isArray(response.data.failures) && response.data.failures.length) {
        console.warn('WhatsApp outbound failures', response.data.failures);
      }
      await loadWhatsAppAgentDashboard(true);
    } catch (error) {
      setWhatsAppAgentStatus('error', error.message || 'No fue posible ejecutar la campaña outbound.');
      showToast(error.message || 'No fue posible ejecutar la campaña outbound.');
    } finally {
      hideProcessingModal();
    }
  }

    return items.map(item => `
      <div class="tincho-integration-card">
        <div class="tincho-integration-head">
          <span class="tincho-integration-pill ${resolveTinchoIntegrationTone(item)}">${resolveTinchoIntegrationLabel(item)}</span>

        <strong>${escapeHtml(item.label || '')}</strong>
        <div class="tincho-simple-meta">${escapeHtml(item.detail || '')}</div>
      </div>

  function renderTinchoQueryResult(query, escalation) {
    if (!query) return;

    const feedbackForm = document.getElementById('tinchoFeedbackForm');
    const suggestions = query.suggestedSteps || [];
    const sources = query.sourceManualTitles || [];
    const canPlayAudio = !!(isTinchoTtsEnabled_() && String(query.respuesta || '').trim());
    const escalationHtml = escalation ? `
      <div class="tincho-suggestion-item">

        <div>${escapeHtml(escalation.detalle || 'La consulta quedó registrada para seguimiento interno.')}</div>
        <div class="tincho-simple-meta">Estatus: ${escapeHtml(escalation.estadoEscalacion || '')}</div>
      </div>
    ` : '';

    conversationNode.innerHTML = `
      <div class="tincho-message asker">
        <div class="tincho-message-header">
          <strong>${escapeHtml(state.user && state.user.name ? state.user.name : 'Usuario')}</strong>

        </div>
        <div class="tincho-answer-text">${escapeHtml(query.pregunta || '')}</div>
      </div>

      <div class="tincho-message">

              <div class="accounts-product-metric"><span>% hombres</span><strong>${escapeHtml(Number(row.malePct || 0).toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 }))}%</strong></div>

  function renderAccountsConsumptionSummary(summary, source) {
    const slice = resolveAccountsConsumptionSlice_(summary);

    const topStatesVisibleTotal = topStates.reduce((acc, item) => acc + Number(item.value || 0), 0);

    const channelRows = [
      { label: 'Ecommerce', value: Number(effectiveSummary.ecommerceSharePct || 0), displayValue: `${Number(effectiveSummary.ecommerceSharePct || 0).toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 })}%` },
      { label: 'Tienda física', value: Number(effectiveSummary.physicalSharePct || 0), displayValue: `${Number(effectiveSummary.physicalSharePct || 0).toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 })}%` },
      { label: 'Sin clasificar', value: Number(effectiveSummary.unknownChannelSharePct || 0), displayValue: `${Number(effectiveSummary.unknownChannelSharePct || 0).toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 })}%` }

      <div class="accounts-consumption-kpi-grid">
        ${renderAccountsConsumptionKpiCard_('Gasto total', money(totalSpend), `${transactionCount.toLocaleString('es-MX')} compras identificadas en ${periodLabel.toLowerCase()}.`)}
        ${renderAccountsConsumptionKpiCard_('Clientes compradores', buyerCount.toLocaleString('es-MX'), `${averageTransactionsPerBuyer.toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 })} compras promedio por cliente comprador.`)}
        ${renderAccountsConsumptionKpiCard_('Ticket promedio', money(averageTicket), 'Monto promedio por transacción de consumo.')}

  function hydrateAccountsConsumptionPeriodFilters_(summary) {
    const modeSelect = document.getElementById('accountsConsumptionPeriodMode');
    const valueSelect = document.getElementById('accountsConsumptionPeriodValue');
    if (!modeSelect || !valueSelect) return;

    const periodOptions = summary && summary.periodOptions ? summary.periodOptions : { months: [], quarters: [] };
    const hasMonth = Array.isArray(periodOptions.months) && periodOptions.months.length > 0;
    const hasQuarter = Array.isArray(periodOptions.quarters) && periodOptions.quarters.length > 0;
    let mode = String(state.accountsConsumptionPeriodMode || 'quarter').trim().toLowerCase();
    if (mode !== 'month' && mode !== 'quarter') mode = 'quarter';
    if (mode === 'month' && !hasMonth) mode = hasQuarter ? 'quarter' : 'month';
    if (mode === 'quarter' && !hasQuarter) mode = hasMonth ? 'month' : 'quarter';
    state.accountsConsumptionPeriodMode = mode;

    const list = mode === 'month'
      ? (hasMonth ? periodOptions.months : [])
      : (hasQuarter ? periodOptions.quarters : []);
    const currentValue = String(state.accountsConsumptionPeriodValue || '').trim();
    const found = list.some(item => String(item && item.value || '') === currentValue);
    state.accountsConsumptionPeriodValue = found ? currentValue : (list[0] ? String(list[0].value || '') : '');

    modeSelect.value = mode;
    valueSelect.disabled = list.length < 1;
    valueSelect.innerHTML = list.length
      ? list.map(item => `<option value="${escapeHtml(String(item.value || ''))}">${escapeHtml(String(item.label || item.value || ''))}</option>`).join('')
      : '<option value="">Sin periodos disponibles</option>';
    valueSelect.value = String(state.accountsConsumptionPeriodValue || '');
  }

  function resolveAccountsConsumptionSlice_(summary) {
    if (!summary) return { summary: null, periodLabel: '' };
    const mode = String(state.accountsConsumptionPeriodMode || 'quarter').trim().toLowerCase();
    const value = String(state.accountsConsumptionPeriodValue || '').trim();
    const snapshots = summary.periodSnapshots && summary.periodSnapshots[mode];
    if (snapshots && value && snapshots[value]) {
      const selected = snapshots[value];
      return {
        summary: selected,
        periodLabel: selected.periodLabel || summary.windowLabel || ''
      };
    }
    return {
      summary: summary,
      periodLabel: summary.windowLabel || ''
    };
  }

  function renderAccountsConsumptionKpiCard_(label, value, sub) {
    return `
      <div class="accounts-kpi-card">
        <div class="accounts-kpi-value">${escapeHtml(value || '-')}</div>
        <div class="accounts-kpi-sub">${escapeHtml(sub || '')}</div>
        <div class="accounts-kpi-label">${escapeHtml(label || '')}</div>
      </div>
    `;
  }

  function formatCompactCountForDonut_(value) {
    const safeValue = Number(value || 0);
    if (!Number.isFinite(safeValue)) return '0';
    try {
      return new Intl.NumberFormat('es-MX', {
        notation: 'compact',
        compactDisplay: 'short',
        maximumFractionDigits: 1
      }).format(safeValue);
    } catch (error) {
      return safeValue.toLocaleString('es-MX');
    }
  }

  function formatCompactMoneyForDonut_(value) {
    const safeValue = Number(value || 0);
    if (!Number.isFinite(safeValue)) return money(0);
    try {
      return new Intl.NumberFormat('es-MX', {
        style: 'currency',
        currency: 'MXN',
        notation: 'compact',
        compactDisplay: 'short',
        maximumFractionDigits: 1
      }).format(safeValue);
    } catch (error) {
      return money(safeValue);
    }
  }

  function buildPriorityTopMerchants_(rows, limit, priorityLabels) {
    const safeRows = Array.isArray(rows) ? rows.filter(Boolean) : [];
    const safeLimit = Math.max(1, Number(limit || 10));
    const selected = safeRows.slice(0, safeLimit);
    const selectedKeys = {};

    selected.forEach(item => {
      const key = normalizeDonutLabelKey_(item && item.label);
      if (key) selectedKeys[key] = true;
    });

    (Array.isArray(priorityLabels) ? priorityLabels : []).forEach(priority => {
      const priorityKey = normalizeDonutLabelKey_(priority);
      if (!priorityKey || selectedKeys[priorityKey]) return;
      const match = safeRows.find(item => normalizeDonutLabelKey_(item && item.label) === priorityKey);
      if (!match) return;
      selected.push(match);
      selectedKeys[priorityKey] = true;
    });

    return selected.sort((a, b) => Number(b && b.value || 0) - Number(a && a.value || 0));
  }

  function normalizeDonutLabelKey_(value) {
    return String(value || '')
      .toUpperCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function renderAccountsConsumptionTopList_(title, items, baseValue, formatter) {
    const safeItems = Array.isArray(items) ? items.filter(Boolean) : [];
    const maxValue = Math.max(Number(baseValue || 0), ...safeItems.map(item => Number(item.value || 0)), 0);
    return `
      <div class="accounts-consumption-card accounts-toplist-card">
        <div class="accounts-consumption-kicker">${escapeHtml(title || '')}</div>
        <div class="accounts-toplist-body">
          ${safeItems.length ? safeItems.map((item, index) => {
            const value = Number(item.value || 0);
            const width = maxValue ? Math.max(18, Math.round((value / maxValue) * 100)) : 0;
            const opacity = safeItems.length > 1 ? (1 - (index / Math.max(1, safeItems.length - 1)) * 0.8) : 1;
            return `
              <div class="accounts-toplist-row">
                <div class="accounts-toplist-row-fill" style="width:${width}%; opacity:${opacity.toFixed(2)}"></div>
                <div class="accounts-toplist-row-content">
                  <span class="accounts-toplist-name">${escapeHtml(item.label || '')}</span>
                  <strong class="accounts-toplist-value">${escapeHtml(formatter ? formatter(value) : String(value))}</strong>
                </div>
              </div>
            `;
          }).join('') : '<div class="empty">Sin datos disponibles.</div>'}
        </div>
      </div>
    `;
  }

        .filter(item => item.label && item.value >= 0)
      : [];
    const total = safeItems.reduce((acc, item) => acc + Number(item.value || 0), 0);
    const palette = buildAccountsDonutPalette_(safeItems, safeOptions.paletteName || 'default');
    const centerMetricLabel = safeOptions.centerMetricLabel || '';
    const centerMetricValue = String(safeOptions.centerMetricValue || '-').trim();
    const centerMetricValueClass = centerMetricValue.length > 11 ? ' accounts-donut-center-value--long' : '';
    const centerTopSharePct = Number(safeOptions.centerTopSharePct || 0);
    const centerTopShareCaption = safeOptions.centerTopShareCaption || '';
    const formatter = typeof safeOptions.formatter === 'function' ? safeOptions.formatter : null;

    return `
      <div class="accounts-consumption-card accounts-donut-card">
        <div class="accounts-consumption-kicker">${escapeHtml(title || '')}</div>
        <div class="accounts-donut-layout">
          <div class="accounts-donut-visual">
            ${safeItems.length && total > 0 ? renderAccountsDonutSvg_(title, safeItems, total, palette, formatter) : '<div class="empty">Sin datos disponibles.</div>'}
            <div class="accounts-donut-center">
              <div class="accounts-donut-center-share">${escapeHtml(centerTopSharePct.toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 }))}%</div>
              <div class="accounts-donut-center-caption">${escapeHtml(centerTopShareCaption)}</div>
              <strong class="accounts-donut-center-value${centerMetricValueClass}">${escapeHtml(centerMetricValue)}</strong>
              <span>${escapeHtml(centerMetricLabel)}</span>
            </div>
          </div>
          <div class="accounts-donut-legend">
            ${safeItems.length ? safeItems.map((item, index) => {
              const value = Number(item.value || 0);
              const share = total ? (value / total) * 100 : 0;
              const color = palette[index];
              return `
                <button
                  type="button"
                  class="accounts-donut-legend-item"
                  onmouseenter="showAccountsDonutTooltip(event, '${escapeJsString(item.label)}', '${escapeJsString(formatter ? formatter(value) : String(value))}', '${escapeJsString(share.toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 }))}%', '${escapeJsString(color)}')"
                  onmousemove="moveAccountsDonutTooltip(event)"
                  onmouseleave="hideAccountsDonutTooltip(event)"
                  onfocus="showAccountsDonutTooltip(event, '${escapeJsString(item.label)}', '${escapeJsString(formatter ? formatter(value) : String(value))}', '${escapeJsString(share.toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 }))}%', '${escapeJsString(color)}')"
                  onblur="hideAccountsDonutTooltip(event)"
                >
                  <span class="accounts-donut-dot" style="background:${escapeAttribute(color)}"></span>
                  <span class="accounts-donut-legend-copy">
                    <strong>${escapeHtml(item.label)}</strong>
                    <small>${escapeHtml(formatter ? formatter(value) : String(value))}</small>
                  </span>
                  <span class="accounts-donut-legend-share">${escapeHtml(share.toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 }))}%</span>
                </button>
              `;
            }).join('') : '<div class="empty">Sin datos disponibles.</div>'}
          </div>
        </div>
        <div class="accounts-donut-tooltip" hidden></div>
      </div>
    `;
  }

  function buildAccountsConsumptionDonutRows_(items, grandTotal, othersLabel) {
    const safeItems = Array.isArray(items)
      ? items
        .filter(Boolean)
        .map(item => ({ label: String(item.label || ''), value: Number(item.value || 0) }))
        .filter(item => item.label && item.value >= 0)
      : [];
    const visibleTotal = safeItems.reduce((acc, item) => acc + Number(item.value || 0), 0);
    const total = Math.max(Number(grandTotal || 0), visibleTotal, 0);
    const remainder = Math.round(Math.max(0, total - visibleTotal) * 100) / 100;
    if (remainder > 0) {
      safeItems.push({
        label: othersLabel || 'Otros',
        value: remainder
      });
    }
    return safeItems;
  }

  function renderAccountsDonutSvg_(title, items, total, palette, formatter) {
    const size = 244;
    const center = size / 2;
    const outerRadius = 88;
    const innerRadius = 66;
    let currentAngle = -90;

    const segments = items.map((item, index) => {
      const value = Number(item.value || 0);
      const sweep = total ? (value / total) * 360 : 0;
      const startAngle = currentAngle;
      const endAngle = currentAngle + sweep;
      currentAngle = endAngle;
      const color = palette[index];
      const share = total ? (value / total) * 100 : 0;
      return `
        <g
          class="accounts-donut-segment"
          tabindex="0"
          onmouseenter="showAccountsDonutTooltip(event, '${escapeJsString(item.label)}', '${escapeJsString(formatter ? formatter(value) : String(value))}', '${escapeJsString(share.toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 }))}%', '${escapeJsString(color)}')"
          onmousemove="moveAccountsDonutTooltip(event)"
          onmouseleave="hideAccountsDonutTooltip(event)"
          onfocus="showAccountsDonutTooltip(event, '${escapeJsString(item.label)}', '${escapeJsString(formatter ? formatter(value) : String(value))}', '${escapeJsString(share.toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 }))}%', '${escapeJsString(color)}')"
          onblur="hideAccountsDonutTooltip(event)"
        >
          <path d="${describeAccountsDonutArc_(center, center, outerRadius, innerRadius, startAngle, endAngle)}" fill="${escapeAttribute(color)}"></path>
          <title>${escapeHtml(item.label)} · ${escapeHtml(formatter ? formatter(value) : String(value))} · ${escapeHtml(share.toLocaleString('es-MX', { minimumFractionDigits: 1, maximumFractionDigits: 1 }))}%</title>
        </g>
      `;
    }).join('');

    return `
      <svg class="accounts-donut-chart" viewBox="0 0 ${size} ${size}" role="img" aria-label="${escapeAttribute(title || 'Donut chart')}">
        <circle cx="${center}" cy="${center}" r="${(outerRadius + innerRadius) / 2}" stroke="rgba(222,235,231,0.55)" stroke-width="${outerRadius - innerRadius}" fill="none"></circle>
        ${segments}
      </svg>
    `;
  }

  function buildAccountsDonutPalette_(items, paletteName) {
    const safeItems = Array.isArray(items) ? items : [];
    const count = safeItems.length;
    if (paletteName === 'tealBlue') {
      const sequence = ['#2DC5B6', '#4FCFC2', '#6BD9CD', '#20A6DE', '#1379A3'];
      return safeItems.map((item, index) => {
        if (String(item.label || '').toLowerCase() === 'otros') return '#C3D6DD';
        return sequence[Math.min(index, sequence.length - 1)];
      });
    }
    const base = ['#11b7ad', '#35c5b9', '#5fd4c6', '#88e0d2', '#b2ece4', '#d6f6f1'];
    if (count <= base.length) return base.slice(0, count);
    const palette = [];
    for (let index = 0; index < count; index += 1) {
      const ratio = count > 1 ? index / (count - 1) : 0;
      const lightness = 42 + Math.round(ratio * 36);
      palette.push(`hsl(173 63% ${lightness}%)`);
    }
    return palette;
  }

  function describeAccountsDonutArc_(cx, cy, outerRadius, innerRadius, startAngle, endAngle) {
    const startOuter = polarToCartesian_(cx, cy, outerRadius, endAngle);
    const endOuter = polarToCartesian_(cx, cy, outerRadius, startAngle);
    const startInner = polarToCartesian_(cx, cy, innerRadius, startAngle);
    const endInner = polarToCartesian_(cx, cy, innerRadius, endAngle);
    const largeArcFlag = endAngle - startAngle <= 180 ? '0' : '1';
    return [
      'M', startOuter.x, startOuter.y,
      'A', outerRadius, outerRadius, 0, largeArcFlag, 0, endOuter.x, endOuter.y,
      'L', startInner.x, startInner.y,
      'A', innerRadius, innerRadius, 0, largeArcFlag, 1, endInner.x, endInner.y,
      'Z'
    ].join(' ');
  }

  function polarToCartesian_(cx, cy, radius, angleInDegrees) {
    const angleInRadians = (angleInDegrees - 90) * Math.PI / 180;
    return {
      x: roundSvg_(cx + (radius * Math.cos(angleInRadians))),
      y: roundSvg_(cy + (radius * Math.sin(angleInRadians)))
    };
  }

  function showAccountsDonutTooltip(event, title, value, share, color) {
    const card = event && event.currentTarget ? event.currentTarget.closest('.accounts-donut-card') : null;
    const tooltip = card ? card.querySelector('.accounts-donut-tooltip') : null;
    if (!tooltip) return;
    tooltip.innerHTML = `
      <div class="accounts-donut-tooltip-label">
        <span class="accounts-donut-dot" style="background:${escapeAttribute(color || '#11b7ad')}"></span>
        <strong>${escapeHtml(title || '')}</strong>
      </div>
      <div class="accounts-donut-tooltip-meta">${escapeHtml(value || '')} · ${escapeHtml(share || '')}</div>
    `;
    tooltip.hidden = false;
    moveAccountsDonutTooltip(event);
  }

  function moveAccountsDonutTooltip(event) {
    const card = event && event.currentTarget ? event.currentTarget.closest('.accounts-donut-card') : null;
    const tooltip = card ? card.querySelector('.accounts-donut-tooltip') : null;
    if (!tooltip || tooltip.hidden) return;
    const rect = card.getBoundingClientRect();
    const tooltipWidth = tooltip.offsetWidth || 180;
    const tooltipHeight = tooltip.offsetHeight || 54;
    let left = event.clientX - rect.left + 18;
    let top = event.clientY - rect.top - tooltipHeight - 16;
    if (left + tooltipWidth > rect.width - 12) left = rect.width - tooltipWidth - 12;
    if (left < 12) left = 12;
    if (top < 12) top = event.clientY - rect.top + 18;
    tooltip.style.left = `${left}px`;
    tooltip.style.top = `${top}px`;
  }

  function hideAccountsDonutTooltip(event) {
    const card = event && event.currentTarget ? event.currentTarget.closest('.accounts-donut-card') : null;
    const tooltip = card ? card.querySelector('.accounts-donut-tooltip') : null;
    if (!tooltip) return;
    tooltip.hidden = true;
  }

    const merchantsBase = Math.max(...topMerchants.map(item => Number(item.value || 0)), 0);

    return `
      <div class="accounts-consumption-card accounts-proto-card">

  function renderAccountsHistoricalChart(series, startDate, endDate) {
    if (!series || !series.length) {
      return '<div class="accounts-historical-empty">No hay aperturas en el rango seleccionado.</div>';
    }

    const width = 900;
    const height = 320;
    const padding = { top: 20, right: 24, bottom: 42, left: 52 };
    const chartWidth = width - padding.left - padding.right;
    const chartHeight = height - padding.top - padding.bottom;
    const maxValue = Math.max(...series.map(item => Number(item.accounts || 0)), 1);
    const minValue = 0;
    const denominator = series.length > 1 ? (series.length - 1) : 1;

    const points = series.map((item, index) => {
      const x = padding.left + (chartWidth * index / denominator);
      const y = padding.top + chartHeight - ((Number(item.accounts || 0) - minValue) / (maxValue - minValue || 1)) * chartHeight;
      return `${roundSvg_(x)},${roundSvg_(y)}`;
    }).join(' ');

    const yTicks = [0, Math.round(maxValue / 2), maxValue].filter((value, index, arr) => arr.indexOf(value) === index);
    const firstDate = series[0].date || startDate || '';
    const lastDate = series[series.length - 1].date || endDate || '';

    return `
      <div class="accounts-historical-chart-card">
        <div class="accounts-historical-chart-caption">Tendencia diaria de aperturas entre <strong>${escapeHtml(startDate || firstDate)}</strong> y <strong>${escapeHtml(endDate || lastDate)}</strong>.</div>
        <svg class="accounts-historical-chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="Tendencia diaria de aperturas">
          <line x1="${padding.left}" y1="${padding.top + chartHeight}" x2="${width - padding.right}" y2="${padding.top + chartHeight}" stroke="#cfe0da" stroke-width="2" />
          <line x1="${padding.left}" y1="${padding.top}" x2="${padding.left}" y2="${padding.top + chartHeight}" stroke="#cfe0da" stroke-width="2" />
          ${yTicks.map(value => {
            const y = padding.top + chartHeight - ((Number(value || 0) - minValue) / (maxValue - minValue || 1)) * chartHeight;
            return `
              <line x1="${padding.left}" y1="${roundSvg_(y)}" x2="${width - padding.right}" y2="${roundSvg_(y)}" stroke="#e6efeb" stroke-width="1" />
              <text x="${padding.left - 12}" y="${roundSvg_(y + 4)}" text-anchor="end" fill="#5f766c" font-size="12">${escapeHtml(Number(value || 0).toLocaleString('es-MX'))}</text>
            `;
          }).join('')}
          <polyline fill="none" stroke="#009F9C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="${points}" />
          ${series.map((item, index) => {
            const x = padding.left + (chartWidth * index / denominator);
            const y = padding.top + chartHeight - ((Number(item.accounts || 0) - minValue) / (maxValue - minValue || 1)) * chartHeight;
            return `
              <circle cx="${roundSvg_(x)}" cy="${roundSvg_(y)}" r="4" fill="#009F9C">
                <title>${escapeHtml(item.date)}: ${escapeHtml(Number(item.accounts || 0).toLocaleString('es-MX'))} cuentas</title>
              </circle>
            `;
          }).join('')}
          <text x="${padding.left}" y="${height - 10}" text-anchor="start" fill="#5f766c" font-size="12">${escapeHtml(firstDate)}</text>
          <text x="${width - padding.right}" y="${height - 10}" text-anchor="end" fill="#5f766c" font-size="12">${escapeHtml(lastDate)}</text>
        </svg>
        <div class="accounts-historical-chart-footer">
          <span>${escapeHtml(Number(series.length || 0).toLocaleString('es-MX'))} días en el rango</span>
          <span>Máximo diario: <strong>${escapeHtml(Number(maxValue || 0).toLocaleString('es-MX'))}</strong></span>
        </div>
      </div>
    `;
  }

  function getCustomerCategorizationOrderStorageKey_() {
    return `billu-customer-categorization-order-${window.__APP_INFO__ && window.__APP_INFO__.version ? window.__APP_INFO__.version : 'latest'}`;
  }

  function loadCustomerCategorizationOrder_() {
    try {
      return JSON.parse(window.localStorage.getItem(getCustomerCategorizationOrderStorageKey_()) || '[]');
    } catch (error) {
      return [];
    }
  }

  function saveCustomerCategorizationOrder_(order) {
    state.customerCategorizationOrder = Array.isArray(order) ? order.slice() : [];
    try {
      window.localStorage.setItem(getCustomerCategorizationOrderStorageKey_(), JSON.stringify(state.customerCategorizationOrder));
    } catch (error) {
      // Ignore local storage failures and keep order only in memory.
    }
  }

  function persistCustomerCategorizationOrder_(rows) {
    const orderedIds = (rows || []).map(row => String(row.segmentId || ''));
    console.log('[CustomerCategorization] Persist placeholder:', orderedIds);
    // Placeholder para futura persistencia en backend o base de datos.
  }

  function getCustomerCategorizationOrderedRows_(rows) {
    const safeRows = Array.isArray(rows) ? rows.slice() : [];
    const storedOrder = state.customerCategorizationOrder && state.customerCategorizationOrder.length
      ? state.customerCategorizationOrder
      : loadCustomerCategorizationOrder_();
    if (!storedOrder.length) return safeRows;

    const orderMap = storedOrder.reduce((acc, segmentId, index) => {
      acc[String(segmentId || '')] = index;
      return acc;
    }, {});

    return safeRows.sort((a, b) => {
      const indexA = orderMap.hasOwnProperty(String(a.segmentId || '')) ? orderMap[String(a.segmentId || '')] : Number.MAX_SAFE_INTEGER;
      const indexB = orderMap.hasOwnProperty(String(b.segmentId || '')) ? orderMap[String(b.segmentId || '')] : Number.MAX_SAFE_INTEGER;
      if (indexA !== indexB) return indexA - indexB;
      return String(a.segmentLabel || a.segmentId || '').localeCompare(String(b.segmentLabel || b.segmentId || ''));
    });
  }

  function hydrateCustomerCategorizationSegments() {
    const wrap = document.querySelector('.customer-categorization-table-wrap');
    if (!wrap) return;
    const rows = Array.from(wrap.querySelectorAll('.customer-categorization-main-row'));
    if (!rows.length) return;

    rows.forEach(row => {
      row.addEventListener('dragstart', handleCustomerCategorizationDragStart_);
      row.addEventListener('dragend', handleCustomerCategorizationDragEnd_);
      row.addEventListener('dragover', handleCustomerCategorizationDragOver_);
      row.addEventListener('dragleave', handleCustomerCategorizationDragLeave_);
      row.addEventListener('drop', handleCustomerCategorizationDrop_);
    });
  }

  function handleCustomerCategorizationDragStart_(event) {
    const row = event.currentTarget;
    if (!row) return;
    if (!event.target || !event.target.closest('.customer-categorization-drag-handle')) {
      event.preventDefault();
      return;
    }
    const segmentId = row.dataset.segmentId || '';
    state.customerCategorizationDraggedSegmentId = segmentId;
    row.classList.add('is-dragging');
    if (event.dataTransfer) {
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', segmentId);
    }
  }

  function handleCustomerCategorizationDragEnd_(event) {
    state.customerCategorizationDraggedSegmentId = '';
    document.querySelectorAll('.customer-categorization-main-row').forEach(node => {
      node.classList.remove('is-dragging', 'is-drop-before', 'is-drop-after');
    });
  }

  function handleCustomerCategorizationDragOver_(event) {
    event.preventDefault();
    const targetRow = event.currentTarget;
    if (!targetRow || !state.customerCategorizationDraggedSegmentId || targetRow.dataset.segmentId === state.customerCategorizationDraggedSegmentId) return;
    const rect = targetRow.getBoundingClientRect();
    const before = event.clientY < rect.top + rect.height / 2;
    targetRow.classList.toggle('is-drop-before', before);
    targetRow.classList.toggle('is-drop-after', !before);
    if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
  }

  function handleCustomerCategorizationDragLeave_(event) {
    const targetRow = event.currentTarget;
    if (!targetRow) return;
    targetRow.classList.remove('is-drop-before', 'is-drop-after');
  }

  function handleCustomerCategorizationDrop_(event) {
    event.preventDefault();
    const targetRow = event.currentTarget;
    const draggedSegmentId = state.customerCategorizationDraggedSegmentId || (event.dataTransfer ? event.dataTransfer.getData('text/plain') : '');
    if (!targetRow || !draggedSegmentId) return;
    const targetSegmentId = targetRow.dataset.segmentId || '';
    if (!targetSegmentId || targetSegmentId === draggedSegmentId) return;

    const currentRows = state.customerCategorization && Array.isArray(state.customerCategorization.segmentSummary)
      ? state.customerCategorization.segmentSummary.slice()
      : [];
    if (!currentRows.length) return;

    const orderedRows = getCustomerCategorizationOrderedRows_(currentRows);
    const draggedIndex = orderedRows.findIndex(row => String(row.segmentId || '') === draggedSegmentId);
    const targetIndex = orderedRows.findIndex(row => String(row.segmentId || '') === targetSegmentId);
    if (draggedIndex === -1 || targetIndex === -1) return;

    const rect = targetRow.getBoundingClientRect();
    const insertBefore = event.clientY < rect.top + rect.height / 2;
    const nextRows = orderedRows.slice();
    const moved = nextRows.splice(draggedIndex, 1)[0];
    const insertIndex = insertBefore
      ? (draggedIndex < targetIndex ? targetIndex - 1 : targetIndex)
      : (draggedIndex < targetIndex ? targetIndex : targetIndex + 1);
    nextRows.splice(Math.max(0, Math.min(nextRows.length, insertIndex)), 0, moved);

    if (state.customerCategorization && Array.isArray(state.customerCategorization.segmentSummary)) {
      state.customerCategorization.segmentSummary = nextRows.slice();
    }
    saveCustomerCategorizationOrder_(nextRows.map(row => row.segmentId));
    persistCustomerCategorizationOrder_(nextRows);
    console.log('[CustomerCategorization] Nuevo orden:', nextRows.map(row => row.segmentLabel || row.segmentId));
    renderCustomerCategorizationDashboard(state.customerCategorization);
  }
