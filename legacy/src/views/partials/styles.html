<style>
  :root {
    --bg: #eef3f1;
    --surface: #ffffff;
    --surface-soft: #f6faf8;
    --ink: #173126;
    --muted: #5f766c;
    --line: #d7e3dd;
    --primary: #009F9C;
    --primary-soft: #A1E9D1;
    --accent: #af7a23;
    --danger: #b23a3a;
    --shadow: 0 14px 40px rgba(23, 49, 38, 0.08);
    --radius: 18px;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Avenir Next", "Segoe UI", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(0, 159, 156, 0.15), transparent 28%),
      radial-gradient(circle at bottom right, rgba(161, 233, 209, 0.25), transparent 24%),
      var(--bg);
    transition: background 0.24s ease;
  }

  body.auth-gate-active {
    overflow: hidden;
  }

  .shell {
    display: grid;
    grid-template-columns: 280px 1fr;
    column-gap: 24px;
    min-height: 100vh;
    transition: opacity 0.22s ease, filter 0.22s ease, transform 0.22s ease;
  }

  body.auth-gate-active .shell {
    opacity: 0;
    filter: none;
    transform: none;
    pointer-events: none;
    user-select: none;
  }

  .sidebar {
    padding: 28px 20px;
    background: linear-gradient(180deg, #0d4d4a, #009F9C);
    color: #eef7f2;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .brand {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .brand-sub {
    color: rgba(238, 247, 242, 0.7);
    margin-top: 6px;
  }

  .menu {
    display: grid;
    gap: 8px;
  }

  .menu-item {
    border: 0;
    background: rgba(255, 255, 255, 0.08);
    color: #eef7f2;
    text-align: left;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s ease;
    position: relative;
  }

  .menu-item-with-tag {
    display: block;
    padding-right: 122px;
    padding-bottom: 28px;
  }

  .menu-item-label {
    display: block;
    min-width: 0;
  }

  .menu-item-tag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 7px;
    border-radius: 999px;
    background: rgba(175, 122, 35, 0.16);
    border: 1px solid rgba(255, 240, 214, 0.22);
    color: #fff4dc;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
    line-height: 1;
    position: absolute;
    right: 14px;
    bottom: 12px;
  }

  .menu-item-tag-inline {
    margin-top: 0;
    width: fit-content;
    position: static;
  }

  .menu-item:hover,
  .menu-item.active {
    background: rgba(255, 255, 255, 0.18);
    transform: translateX(1px);
  }

  .menu-item.active {
    color: #ffffff;
    font-weight: 700;
    box-shadow: inset 3px 0 0 rgba(255, 255, 255, 0.96);
  }

  .menu-item-submenu {
    margin-left: 18px;
    width: calc(100% - 18px);
    padding: 10px 14px;
    font-size: 15px;
    border-left: 2px solid rgba(255, 255, 255, 0.22);
    background: rgba(255, 255, 255, 0.06);
  }

  .menu-item-tincho {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(161, 233, 209, 0.18));
    border: 1px solid rgba(255, 255, 255, 0.14);
  }

  .menu-item-tincho span:last-child {
    display: grid;
    gap: 4px;
  }

  .menu-item-tincho small {
    color: rgba(238, 247, 242, 0.72);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .menu-item-tincho strong {
    color: #eef7f2;
    font-size: 15px;
  }

  .menu-item-tincho .menu-item-tag-inline {
    margin-top: 2px;
  }

  .menu-item-icon {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.16);
    flex: 0 0 auto;
  }

  .menu-item-icon.menu-item-icon-photo {
    overflow: hidden;
    background: transparent;
    box-shadow: none;
  }

  .menu-item-icon svg {
    width: 34px;
    height: 34px;
    display: block;
  }

  .menu-item-photo {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: center center;
    transform: scale(1.06) translateY(1px);
  }

  .che-avatar-svg {
    width: 100%;
    height: 100%;
    display: block;
    filter: drop-shadow(0 10px 18px rgba(9, 27, 26, 0.12));
  }

  .menu-item-icon .che-avatar-svg,
  .tincho-avatar .che-avatar-svg {
    width: 100%;
    height: 100%;
  }

  .che-avatar-svg-menu {
    transform: scale(1.04);
  }

  .content {
    padding: 36px 38px 42px 6px;
    min-width: 0;
    background: rgba(246, 248, 247, 0.72);
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 24px;
  }

  h1, h3, p { margin-top: 0; }

  .user-badge {
    background: var(--surface);
    padding: 14px 18px;
    border-radius: 16px;
    box-shadow: var(--shadow);
    min-width: 220px;
    display: grid;
    gap: 4px;
    justify-items: start;
  }

  .auth-logout-btn {
    margin-top: 6px;
    padding: 8px 12px;
    border-radius: 10px;
    border: 1px solid rgba(207, 220, 214, 0.95);
    background: rgba(246, 251, 249, 0.92);
    color: #1c5f58;
    cursor: pointer;
    font-weight: 700;
  }

  .view { display: none; }
  .view.active { display: block; }

  .panel,
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
  }

  .grid {
    display: grid;
    gap: 18px;
    margin-bottom: 18px;
  }

  .grid.two {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 18px;
    margin-bottom: 18px;
  }

  #view-projects,
  #view-projects button,
  #view-projects input,
  #view-projects select,
  #view-projects textarea,
  #view-projects table {
    font-family: "Montserrat", "Avenir Next", "Segoe UI", sans-serif;
  }

  .projects-exec-shell {
    display: grid;
    gap: 22px;
  }

  .projects-exec-panel {
    padding: 28px;
    border-radius: 32px;
    background:
      linear-gradient(145deg, rgba(255, 255, 255, 0.82), rgba(244, 248, 247, 0.9)),
      rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(16px);
  }

  .projects-exec-hero {
    align-items: center;
    margin-bottom: 20px;
  }

  .projects-exec-toolbar {
    margin-bottom: 0;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .projects-filter-select {
    border: 1px solid rgba(206, 219, 214, 0.92);
    background: rgba(255, 255, 255, 0.9);
    color: #103531;
    border-radius: 12px;
    padding: 10px 12px;
    min-height: 42px;
    min-width: 220px;
    font-size: 14px;
    font-weight: 600;
  }

  .projects-kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 18px;
  }

  .projects-score-card {
    border: 1px solid rgba(214, 225, 220, 0.92);
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(247, 251, 249, 0.95));
    padding: 14px 16px;
    display: grid;
    gap: 4px;
    min-height: 110px;
    align-content: center;
  }

  .projects-score-card span {
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #587067;
    font-weight: 800;
  }

  .projects-score-card strong {
    font-size: 32px;
    line-height: 1;
    color: #102f2b;
    font-weight: 800;
  }

  .projects-score-card small {
    font-size: 13px;
    color: #6a7f76;
    font-weight: 600;
  }

  .projects-score-card.is-critical {
    border-color: rgba(218, 74, 74, 0.32);
    background: linear-gradient(180deg, rgba(255, 242, 242, 0.96), rgba(255, 248, 248, 0.97));
  }

  .projects-score-card.is-critical strong {
    color: #bf2f2f;
  }

  .projects-score-card.is-warning {
    border-color: rgba(206, 118, 27, 0.35);
    background: linear-gradient(180deg, rgba(255, 248, 238, 0.96), rgba(255, 251, 244, 0.97));
  }

  .projects-score-card.is-warning strong {
    color: #b56116;
  }

  .projects-score-card.is-ok strong {
    color: #0b7f5b;
  }

  .projects-main-grid {
    display: grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 18px;
    align-items: start;
  }

  .projects-column-card {
    grid-column: span 4;
    border: 1px solid rgba(214, 225, 220, 0.88);
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.82);
    box-shadow: 0 12px 30px rgba(16, 46, 39, 0.05);
    padding: 16px;
    min-height: 380px;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    gap: 10px;
  }

  .projects-column-head {
    display: grid;
    gap: 4px;
  }

  .projects-column-head h4 {
    margin: 0;
    font-size: 22px;
    color: #113a35;
  }

  .projects-column-list {
    display: grid;
    gap: 10px;
    align-content: start;
  }

  .projects-list-item {
    border: 1px solid rgba(214, 225, 220, 0.84);
    border-radius: 16px;
    padding: 12px 12px 10px;
    background: rgba(248, 252, 250, 0.96);
    display: grid;
    gap: 8px;
  }

  .projects-list-item-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }

  .projects-list-item-head strong {
    color: #123430;
    font-size: 15px;
    line-height: 1.3;
  }

  .projects-list-item-meta {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    color: #637870;
    font-size: 12px;
    font-weight: 600;
  }

  .projects-list-progress {
    position: relative;
    height: 10px;
  }

  .projects-list-progress-track,
  .projects-list-progress-bar {
    position: absolute;
    inset: 0;
    border-radius: 999px;
  }

  .projects-list-progress-track {
    background: rgba(176, 186, 198, 0.22);
  }

  .projects-list-progress-bar,
  .projects-critical-progress {
    right: auto;
    background: linear-gradient(90deg, #1f9ce1, #15b4cf);
  }

  .projects-list-progress-bar.is-warning,
  .projects-critical-progress.is-warning {
    background: linear-gradient(90deg, #f6a723, #ea7b2d);
  }

  .projects-list-progress-bar.is-critical,
  .projects-critical-progress.is-critical {
    background: linear-gradient(90deg, #e04646, #cc2f2f);
  }

  .projects-list-progress-bar.is-done,
  .projects-critical-progress.is-done {
    background: linear-gradient(90deg, #0f9a6e, #0c7d5b);
  }

  .projects-list-progress-bar.is-pipeline,
  .projects-critical-progress.is-pipeline {
    background: linear-gradient(90deg, #8f9ca6, #73808a);
  }

  .projects-list-micro {
    font-size: 12px;
    color: #5f746c;
    font-weight: 600;
  }

  .projects-list-stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .projects-list-stats span {
    display: inline-flex;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(22, 116, 96, 0.08);
    color: #206757;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .projects-list-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .projects-inline-link {
    border: 0;
    background: transparent;
    color: #0d6658;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.03em;
    cursor: pointer;
    padding: 0;
    text-transform: uppercase;
  }

  .projects-wa-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 5px 10px;
    border-radius: 999px;
    text-decoration: none;
    font-size: 11px;
    font-weight: 800;
    background: rgba(16, 185, 129, 0.14);
    color: #0c7a56;
  }

  .projects-status-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 24px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: rgba(158, 171, 184, 0.2);
    color: #4f6371;
    border: 1px solid rgba(158, 171, 184, 0.26);
  }

  .projects-status-badge.is-progress {
    background: rgba(47, 132, 210, 0.14);
    color: #1f5f9d;
    border-color: rgba(47, 132, 210, 0.24);
  }

  .projects-status-badge.is-done {
    background: rgba(12, 157, 113, 0.14);
    color: #0b7858;
    border-color: rgba(12, 157, 113, 0.24);
  }

  .projects-status-badge.is-warning {
    background: rgba(230, 138, 42, 0.16);
    color: #9f5b15;
    border-color: rgba(230, 138, 42, 0.28);
  }

  .projects-status-badge.is-critical {
    background: rgba(220, 57, 57, 0.16);
    color: #a82626;
    border-color: rgba(220, 57, 57, 0.28);
  }

  .projects-status-badge.is-pipeline {
    background: rgba(141, 156, 170, 0.2);
    color: #546573;
    border-color: rgba(141, 156, 170, 0.28);
  }

  .projects-critical-entrypoint {
    width: 100%;
    border: 1px solid rgba(221, 106, 106, 0.26);
    background: linear-gradient(135deg, rgba(255, 245, 245, 0.95), rgba(255, 251, 251, 0.98));
    border-radius: 20px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    cursor: pointer;
    color: #8f2727;
    margin-bottom: 18px;
  }

  .projects-critical-entrypoint strong {
    color: #8f2727;
    flex: 1;
    text-align: left;
    font-size: 14px;
  }

  .projects-critical-entrypoint .projects-hero-card-action {
    color: #b92e2e;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  #view-projects.projects-presentation-mode .projects-management-only {
    display: none !important;
  }

  .projects-mosaic {
    display: grid;
    grid-template-columns: 1.15fr 1fr 0.95fr;
    gap: 18px;
    margin-bottom: 18px;
  }

  .projects-hero-card {
    border: 1px solid rgba(214, 225, 220, 0.8);
    border-radius: 32px;
    padding: 24px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(246, 250, 248, 0.92)),
      rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(18px);
    box-shadow: 0 18px 42px rgba(20, 45, 42, 0.08);
    min-height: 320px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  button.projects-hero-card {
    text-align: left;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }

  button.projects-hero-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 24px 48px rgba(20, 45, 42, 0.12);
    border-color: rgba(186, 66, 66, 0.28);
  }

  .projects-hero-card-critical {
    background:
      radial-gradient(circle at top, rgba(231, 76, 60, 0.08), transparent 40%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(252, 247, 247, 0.96));
  }

  .projects-hero-card-alert {
    background:
      radial-gradient(circle at top left, rgba(255, 120, 80, 0.12), transparent 40%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 249, 246, 0.96));
  }

  .projects-hero-card-neutral {
    background:
      radial-gradient(circle at bottom right, rgba(0, 159, 156, 0.1), transparent 38%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(245, 250, 248, 0.96));
  }

  .projects-hero-card-head,
  .projects-board-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .projects-hero-card-label {
    font-size: 15px;
    letter-spacing: 0.08em;
    font-weight: 800;
    color: #1a1d22;
  }

  .projects-hero-card-chip {
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(199, 40, 40, 0.12);
    color: #b42318;
    font-size: 12px;
    font-weight: 700;
  }

  .projects-hero-card-chip-soft {
    background: rgba(28, 93, 78, 0.1);
    color: #1e6758;
  }

  .projects-hero-card-chip-live {
    background: rgba(15, 130, 97, 0.12);
    color: #0b7b5d;
  }

  .projects-hero-ring {
    position: relative;
    width: 212px;
    height: 212px;
    margin: 0 auto;
  }

  .projects-hero-ring-svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .projects-hero-ring-track {
    fill: none;
    stroke: rgba(177, 185, 205, 0.18);
    stroke-width: 14;
  }

  .projects-hero-ring-bar {
    fill: none;
    stroke: #de4d4d;
    stroke-width: 14;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s ease;
  }

  .projects-hero-ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 6px;
  }

  .projects-hero-ring-center strong {
    font-size: 52px;
    line-height: 1;
    color: #cc4444;
    font-weight: 800;
  }

  .projects-hero-ring-center span {
    color: #61746c;
    font-size: 14px;
  }

  .projects-hero-card-foot {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    color: #5e726a;
    font-size: 14px;
  }

  .projects-hero-card-action {
    color: #c73e3e;
    font-weight: 700;
  }

  .projects-hero-list {
    display: grid;
    gap: 14px;
    margin-top: 6px;
  }

  .projects-hero-list-item,
  .projects-incident-summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(213, 223, 220, 0.72);
  }

  .projects-hero-list-item:last-child,
  .projects-incident-summary-row:last-child {
    border-bottom: 0;
  }

  .projects-hero-list-item span,
  .projects-incident-summary-row span {
    color: #62756d;
  }

  .projects-hero-list-item strong,
  .projects-incident-summary-row strong {
    color: #172f2c;
    font-size: 18px;
    font-weight: 800;
  }

  .projects-hero-wave {
    margin-top: auto;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    min-height: 90px;
  }

  .projects-hero-wave span {
    display: block;
    flex: 1;
    border-radius: 999px 999px 18px 18px;
    background: linear-gradient(180deg, rgba(0, 159, 156, 0.72), rgba(0, 159, 156, 0.18));
  }

  .projects-hero-wave span:nth-child(1) { height: 40px; }
  .projects-hero-wave span:nth-child(2) { height: 56px; }
  .projects-hero-wave span:nth-child(3) { height: 48px; }
  .projects-hero-wave span:nth-child(4) { height: 76px; }

  .projects-critical-board-panel {
    padding: 24px;
    border-radius: 30px;
    background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(246,250,248,0.94));
  }

  .projects-critical-table {
    display: grid;
    gap: 12px;
  }

  .projects-critical-table-head,
  .projects-critical-row {
    display: grid;
    grid-template-columns: minmax(240px, 1.2fr) 180px 1fr 120px 110px;
    gap: 16px;
    align-items: center;
  }

  .projects-critical-table-head {
    color: #687b73;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 10px 10px;
  }

  .projects-critical-row {
    padding: 16px 10px;
    border-top: 1px solid rgba(214, 225, 220, 0.7);
  }

  .projects-critical-project strong {
    display: block;
    font-size: 16px;
    font-weight: 700;
    color: #192d2b;
    margin-bottom: 4px;
  }

  .projects-critical-project span,
  .projects-critical-owner {
    color: #6a7b74;
    font-size: 14px;
  }

  .projects-critical-owner {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .projects-critical-timeline {
    position: relative;
    height: 12px;
  }

  .projects-critical-track,
  .projects-critical-progress {
